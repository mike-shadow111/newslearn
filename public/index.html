<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Newslearn</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#f7f4ef; --surface:#fff; --border:#e8e2d9;
  --text:#1c1917; --muted:#78716c;
  --accent:#16653a; --accent2:#e8f0eb;
  --a2:#dcfce7; --a2t:#166534;
  --b1:#fef9c3; --b1t:#854d0e;
  --b2:#fee2e2; --b2t:#991b1b;
  --hh:56px; --fh:48px;
}
body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); -webkit-text-size-adjust:100%; overflow-x:hidden; }

/* ── HEADER ── */
header {
  background:var(--surface); border-bottom:1px solid var(--border);
  padding:0 1.5rem; height:var(--hh);
  display:flex; align-items:center; justify-content:space-between;
  position:sticky; top:0; z-index:40;
}
.logo { font-family:'Playfair Display',serif; font-size:1.4rem; color:var(--accent); cursor:pointer; user-select:none; }
.logo span { color:var(--text); }
#updated { font-size:.72rem; color:var(--muted); }

/* ── FILTER BAR ── */
.fbar {
  background:var(--surface); border-bottom:1px solid var(--border);
  position:sticky; top:var(--hh); z-index:30;
  overflow-x:auto; scrollbar-width:none; -webkit-overflow-scrolling:touch;
}
.fbar::-webkit-scrollbar { display:none; }
.finner {
  display:flex; align-items:center; gap:0;
  padding:0 1.5rem; height:var(--fh); min-width:max-content;
}
.fg { display:flex; align-items:center; gap:4px; flex-shrink:0; }
.fg + .fg { margin-left:.9rem; padding-left:.9rem; border-left:1px solid var(--border); }
.flabel { font-size:.63rem; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.07em; margin-right:2px; }
.pill {
  padding:3px 10px; border-radius:100px;
  border:1px solid var(--border); background:transparent;
  font-family:'Inter',sans-serif; font-size:.74rem; color:var(--muted);
  cursor:pointer; transition:all .12s; white-space:nowrap; line-height:1.7;
  -webkit-tap-highlight-color:transparent;
}
.pill:hover { border-color:var(--accent); color:var(--accent); }
.pill.active { background:var(--accent); border-color:var(--accent); color:#fff; }

/* Search — always visible in filter bar, highlighted */
.fg-search { margin-left:1rem; padding-left:.9rem; border-left:1px solid var(--border); }
.swrap { position:relative; }
.sinput {
  padding:4px 10px 4px 30px; border:1.5px solid var(--accent);
  border-radius:100px; background:var(--accent2);
  font-family:'Inter',sans-serif; font-size:.78rem; color:var(--text);
  width:160px; outline:none; transition:width .2s, box-shadow .15s;
}
.sinput:focus { width:220px; box-shadow:0 0 0 3px rgba(22,101,58,.12); }
.sico { position:absolute; left:9px; top:50%; transform:translateY(-50%); pointer-events:none; }

/* ── MAIN ── */
.main { max-width:1180px; margin:0 auto; padding:1.25rem 1.5rem; }
#stats { font-size:.78rem; color:var(--muted); margin-bottom:1rem; }
#stats b { color:var(--text); }

/* ── MASONRY — CSS column-count, the only reliable cross-browser solution ── */
.masonry {
  column-count:3; column-gap:1rem;
}
.card {
  display:block; /* must be block not flex for break-inside to work */
  break-inside:avoid; -webkit-column-break-inside:avoid;
  background:var(--surface); border:1px solid var(--border);
  border-radius:12px; padding:1rem 1.1rem;
  margin-bottom:1rem; /* gap between cards in same column */
  cursor:pointer; transition:transform .13s, box-shadow .13s;
  -webkit-tap-highlight-color:transparent;
}
.card:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(0,0,0,.08); }
.cmeta { display:flex; align-items:center; justify-content:space-between; margin-bottom:.45rem; }
.csrc { font-size:.63rem; font-weight:600; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); }
.lvl { font-size:.63rem; font-weight:600; padding:2px 7px; border-radius:100px; }
.lvl-a2{background:var(--a2);color:var(--a2t);}
.lvl-b1{background:var(--b1);color:var(--b1t);}
.lvl-b2{background:var(--b2);color:var(--b2t);}
.ctitle { font-family:'Playfair Display',serif; font-size:.97rem; line-height:1.42; font-weight:600; color:var(--text); margin-bottom:.4rem; }
.cdesc { font-size:.79rem; color:var(--muted); line-height:1.62; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; margin-bottom:.55rem; }
.cfoot { display:flex; align-items:center; justify-content:space-between; padding-top:.5rem; border-top:1px solid var(--border); }
.cdate { font-size:.68rem; color:var(--muted); }
.ctopic { font-size:.63rem; font-weight:600; padding:2px 7px; border-radius:4px; background:var(--accent2); color:var(--accent); text-transform:capitalize; }

/* ── STATE ── */
.state { padding:4rem 1rem; text-align:center; color:var(--muted); }
.state h3 { font-family:'Playfair Display',serif; color:var(--text); margin-bottom:.4rem; font-size:1.1rem; }
.state p { font-size:.82rem; line-height:1.7; max-width:360px; margin:0 auto; }
.spinner { width:32px; height:32px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .75s linear infinite; margin:0 auto 1rem; }
@keyframes spin{to{transform:rotate(360deg);}}
.retry { margin-top:1rem; padding:7px 18px; background:var(--accent); color:#fff; border:none; border-radius:8px; font-family:'Inter',sans-serif; font-size:.82rem; font-weight:500; cursor:pointer; }

/* ── READER OVERLAY ── */
.overlay {
  display:none; position:fixed; inset:0; z-index:50;
  background:rgba(28,25,23,.55); backdrop-filter:blur(3px); -webkit-backdrop-filter:blur(3px);
  overflow-y:auto; -webkit-overflow-scrolling:touch; padding:1.5rem 1rem;
}
.overlay.open { display:flex; justify-content:center; align-items:flex-start; animation:fin .18s ease; }
@keyframes fin{from{opacity:0}to{opacity:1}}

.rbox {
  background:var(--surface); border-radius:16px;
  width:100%; max-width:720px;
  padding:2rem 2.5rem 3rem; position:relative;
  animation:sin .18s ease;
  font-family:'Inter',sans-serif; /* explicit font override */
}
@keyframes sin{from{transform:translateY(10px);opacity:0}to{transform:none;opacity:1}}

.rclose {
  position:absolute; top:1rem; right:1rem;
  background:var(--bg); border:1px solid var(--border); border-radius:100px;
  padding:4px 14px; font-size:.75rem; font-family:'Inter',sans-serif; color:var(--muted);
  cursor:pointer; transition:all .12s;
}
.rclose:hover { border-color:var(--accent); color:var(--accent); }

.rmeta { display:flex; align-items:center; gap:.5rem; flex-wrap:wrap; margin-bottom:1rem; }
.rtitle {
  font-family:'Playfair Display',serif; font-size:1.65rem; line-height:1.3;
  font-weight:600; color:var(--text); margin-bottom:1.25rem;
}

/* Article body styles */
.abody { font-family:'Inter',sans-serif; }
.abody p {
  font-size:1rem; line-height:1.85; color:var(--text);
  margin-bottom:1.1rem;
}
.abody h2 {
  font-family:'Playfair Display',serif; font-size:1.2rem; font-weight:600;
  color:var(--text); margin:1.5rem 0 .6rem; line-height:1.3;
}
.abody h3 {
  font-family:'Playfair Display',serif; font-size:1rem; font-style:italic;
  color:var(--text); margin:1.25rem 0 .5rem;
}
.abody blockquote {
  border-left:3px solid var(--accent); padding:.5rem 1rem;
  margin:1rem 0; color:var(--muted); font-style:italic;
}
.abody .w {
  cursor:pointer; border-radius:3px; transition:background .1s;
  display:inline; padding:0 1px;
}
.abody .w:hover { background:var(--b1); }

.rhint {
  font-size:.75rem; color:var(--muted); margin-bottom:1.25rem;
  padding:.45rem .75rem; background:var(--accent2); border-radius:8px; display:inline-block;
  font-family:'Inter',sans-serif;
}

/* Loading skeleton */
.rskel { display:flex; flex-direction:column; gap:.75rem; margin:1.5rem 0; }
.rskel-line { background:var(--border); border-radius:4px; animation:pulse 1.2s ease infinite; }
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

.rlink {
  display:inline-flex; align-items:center; gap:.4rem; margin-top:1.75rem;
  padding:.6rem 1.2rem; background:var(--accent); color:#fff;
  border-radius:8px; text-decoration:none; font-size:.82rem; font-weight:500;
  font-family:'Inter',sans-serif; transition:opacity .13s;
}
.rlink:hover { opacity:.85; }

/* ── WORD POPUP ── */
.wpop {
  position:fixed; z-index:60; background:var(--surface);
  border:1px solid var(--border); border-radius:12px;
  padding:.75rem 1rem 1rem; max-width:260px;
  box-shadow:0 8px 28px rgba(0,0,0,.13);
  opacity:0; pointer-events:none; transition:opacity .15s;
  font-family:'Inter',sans-serif;
}
.wpop.show { opacity:1; pointer-events:auto; }
.wclose { position:absolute; top:.4rem; right:.6rem; background:none; border:none; font-size:.9rem; color:var(--muted); cursor:pointer; }
.wword { font-family:'Playfair Display',serif; font-size:1.1rem; margin-bottom:.2rem; color:var(--text); }
.wphon { font-size:.74rem; color:var(--muted); margin-bottom:.4rem; }
.wpos  { font-size:.65rem; font-weight:600; color:var(--accent); text-transform:uppercase; letter-spacing:.04em; margin:.3rem 0 .1rem; }
.wdef  { font-size:.8rem; line-height:1.55; color:var(--text); }

/* ── RESPONSIVE ── */
@media(max-width:640px) {
  :root{--fh:44px;}
  header { padding:0 1rem; }
  .finner { padding:0 1rem; }
  .main { padding:1rem; }
  .masonry { column-count:1; }
  .sinput { width:130px; }
  .sinput:focus { width:160px; }
  .rbox { padding:1.25rem 1.25rem 2rem; }
  .rtitle { font-size:1.2rem; }
  .abody p { font-size:.95rem; }
}
@media(min-width:641px) and (max-width:960px) {
  .masonry { column-count:2; }
  .sinput { width:140px; }
}
</style>
</head>
<body>

<header>
  <div class="logo" id="logo">News<span>learn</span></div>
  <span id="updated"></span>
</header>

<div class="fbar"><div class="finner">
  <div class="fg">
    <span class="flabel">Level</span>
    <button class="pill active" data-f="level" data-v="all">All</button>
    <button class="pill" data-f="level" data-v="a2">A2</button>
    <button class="pill" data-f="level" data-v="b1">B1</button>
    <button class="pill" data-f="level" data-v="b2">B2+</button>
  </div>
  <div class="fg">
    <span class="flabel">Topic</span>
    <button class="pill active" data-f="topic" data-v="all">All</button>
    <button class="pill" data-f="topic" data-v="technology">Tech</button>
    <button class="pill" data-f="topic" data-v="science">Science</button>
    <button class="pill" data-f="topic" data-v="world">World</button>
    <button class="pill" data-f="topic" data-v="business">Business</button>
    <button class="pill" data-f="topic" data-v="health">Health</button>
  </div>
  <div class="fg">
    <span class="flabel">Source</span>
    <button class="pill active" data-f="source" data-v="all">All</button>
    <button class="pill" data-f="source" data-v="BBC">BBC</button>
    <button class="pill" data-f="source" data-v="Guardian">Guardian</button>
    <button class="pill" data-f="source" data-v="The Verge">Verge</button>
    <button class="pill" data-f="source" data-v="NY Times">NYT</button>
    <button class="pill" data-f="source" data-v="Ars Technica">Ars</button>
  </div>
  <div class="fg fg-search">
    <div class="swrap">
      <svg class="sico" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#16653a" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input class="sinput" id="search" type="search" placeholder="Search…" autocomplete="off">
    </div>
  </div>
</div></div>

<div class="main">
  <div id="stats"></div>
  <div id="root"><div class="state"><div class="spinner"></div><h3>Loading…</h3></div></div>
</div>

<!-- READER -->
<div class="overlay" id="overlay">
  <div class="rbox" id="rbox">
    <button class="rclose" id="rclose">✕ Close</button>
    <div id="rcontent"></div>
  </div>
</div>

<!-- WORD POPUP -->
<div class="wpop" id="wpop">
  <button class="wclose" id="wclose">✕</button>
  <div id="wbody"></div>
</div>

<script>
let ALL = [], ARTICLES = [];
let F = {level:'all', topic:'all', source:'all'}, Q = '';
let CACHE = {}, popWord = null;

// ── Utils ─────────────────────────────────────────────────────────────────────
function h(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtDate(s){
  const d = new Date(s);
  return isNaN(d.getTime()) ? '' : d.toLocaleDateString('en-GB',{day:'numeric',month:'short'});
}
function isJunk(a){
  if (!a.title || a.title.length < 20) return true;
  if (!a.url || !a.url.startsWith('http')) return true;
  if (a.title.trim().split(/\s+/).length < 4) return true;
  return false;
}

// ── Render ────────────────────────────────────────────────────────────────────
function render(){
  const list = ALL.filter(a => {
    if (isJunk(a)) return false;
    if (F.level  !== 'all' && a.level  !== F.level)  return false;
    if (F.topic  !== 'all' && a.topic  !== F.topic)  return false;
    if (F.source !== 'all' && a.source !== F.source) return false;
    if (Q){
      const q = Q.toLowerCase();
      if (!a.title.toLowerCase().includes(q) && !(a.desc||'').toLowerCase().includes(q)) return false;
    }
    return true;
  });

  const clean = ALL.filter(a => !isJunk(a));
  document.getElementById('stats').innerHTML =
    list.length === clean.length
      ? `<b>${list.length}</b> articles`
      : `<b>${list.length}</b> of <b>${clean.length}</b> articles`;

  if (!list.length){
    document.getElementById('root').innerHTML = '<div class="state"><h3>No results</h3><p>Try different filters.</p></div>';
    return;
  }

  document.getElementById('root').innerHTML =
    '<div class="masonry">' +
    list.map(a => {
      const idx = ARTICLES.indexOf(a);
      return `<div class="card" data-idx="${idx}">
        <div class="cmeta">
          <span class="csrc">${h(a.source)}</span>
          <span class="lvl lvl-${a.level}">${a.level.toUpperCase()}</span>
        </div>
        <div class="ctitle">${h(a.title)}</div>
        ${a.desc ? `<div class="cdesc">${h(a.desc)}</div>` : ''}
        <div class="cfoot">
          <span class="cdate">${fmtDate(a.date)}</span>
          <span class="ctopic">${h(a.topic)}</span>
        </div>
      </div>`;
    }).join('') +
    '</div>';

  document.querySelectorAll('.card[data-idx]').forEach(el => {
    el.addEventListener('click', () => openReader(parseInt(el.dataset.idx)));
  });
}

// ── Load ──────────────────────────────────────────────────────────────────────
async function loadAll(){
  document.getElementById('stats').textContent = '';
  document.getElementById('root').innerHTML = '<div class="state"><div class="spinner"></div><h3>Loading articles…</h3></div>';
  try {
    const res  = await fetch('/api/news');
    if (!res.ok) throw new Error('HTTP '+res.status);
    const data = await res.json();
    ARTICLES = data.articles || [];
    ALL = ARTICLES;
    document.getElementById('updated').textContent =
      'Updated '+new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
    render();
  } catch(e){
    document.getElementById('root').innerHTML =
      `<div class="state"><h3>Could not load</h3><p>${e.message}</p><button class="retry" onclick="loadAll()">Retry</button></div>`;
  }
}

// ── Reader ────────────────────────────────────────────────────────────────────
async function openReader(idx){
  const a = ARTICLES[idx];
  if (!a) return;

  // Show overlay immediately with title + loading skeleton
  document.getElementById('rcontent').innerHTML =
    `<div class="rmeta">
       <span class="csrc">${h(a.source)}</span>
       <span class="lvl lvl-${a.level}">${a.level.toUpperCase()}</span>
       <span class="cdate" style="margin-left:auto">${fmtDate(a.date)}</span>
     </div>
     <div class="rtitle">${h(a.title)}</div>
     <div class="rhint">💡 Tap any word to see its definition</div>
     <div class="rskel">
       <div class="rskel-line" style="height:14px;width:100%"></div>
       <div class="rskel-line" style="height:14px;width:92%"></div>
       <div class="rskel-line" style="height:14px;width:96%"></div>
       <div class="rskel-line" style="height:14px;width:85%"></div>
       <div class="rskel-line" style="height:14px;width:100%"></div>
       <div class="rskel-line" style="height:14px;width:88%"></div>
     </div>`;

  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  document.getElementById('rbox').scrollTop = 0;

  // Fetch full article
  try {
    const res  = await fetch('/api/article?url='+encodeURIComponent(a.url));
    const data = await res.json();

    if (data.ok && data.blocks && data.blocks.length > 0){
      renderArticle(a, data.blocks);
    } else {
      // Fallback: show desc + link
      renderFallback(a);
    }
  } catch {
    renderFallback(a);
  }
}

function tokenize(text){
  // Split into word/non-word tokens, wrap words in clickable spans
  return text.split(/(\b)/).map(tok => {
    if (/^[a-zA-Z]{2,}$/.test(tok)){
      return `<span class="w" data-word="${tok.toLowerCase()}">${tok}</span>`;
    }
    return tok;
  }).join('');
}

function renderArticle(a, blocks){
  let bodyHtml = '';
  for (const b of blocks){
    const tok = tokenize(b.text);
    if (b.tag === 'h2' || b.tag === 'h1') bodyHtml += `<h2>${tok}</h2>`;
    else if (b.tag === 'h3' || b.tag === 'h4') bodyHtml += `<h3>${tok}</h3>`;
    else if (b.tag === 'blockquote') bodyHtml += `<blockquote>${tok}</blockquote>`;
    else bodyHtml += `<p>${tok}</p>`;
  }

  document.getElementById('rcontent').innerHTML =
    `<div class="rmeta">
       <span class="csrc">${h(a.source)}</span>
       <span class="lvl lvl-${a.level}">${a.level.toUpperCase()}</span>
       <span class="cdate" style="margin-left:auto">${fmtDate(a.date)}</span>
     </div>
     <div class="rtitle">${h(a.title)}</div>
     <div class="rhint">💡 Tap any word to see its definition</div>
     <div class="abody">${bodyHtml}</div>
     <a class="rlink" href="${h(a.url)}" target="_blank" rel="noopener noreferrer">Open original →</a>`;

  attachWordHandlers();
}

function renderFallback(a){
  const tok = tokenize(a.desc || '');
  document.getElementById('rcontent').innerHTML =
    `<div class="rmeta">
       <span class="csrc">${h(a.source)}</span>
       <span class="lvl lvl-${a.level}">${a.level.toUpperCase()}</span>
       <span class="cdate" style="margin-left:auto">${fmtDate(a.date)}</span>
     </div>
     <div class="rtitle">${h(a.title)}</div>
     ${a.desc ? `<div class="rhint">💡 Tap any word to see its definition</div>
     <div class="abody"><p>${tok}</p></div>` : ''}
     <a class="rlink" href="${h(a.url)}" target="_blank" rel="noopener noreferrer">Read full article →</a>`;

  attachWordHandlers();
}

function attachWordHandlers(){
  document.querySelectorAll('#rcontent .w').forEach(el => {
    el.addEventListener('click', e => { e.stopPropagation(); lookupWord(e, el.dataset.word); });
  });
}

function closeReader(){
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
  closePopup();
}

document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('overlay')) closeReader();
});
document.getElementById('rclose').addEventListener('click', closeReader);
document.getElementById('logo').addEventListener('click', closeReader);
document.addEventListener('keydown', e => { if (e.key==='Escape') closeReader(); });

// ── Word lookup ───────────────────────────────────────────────────────────────
async function lookupWord(e, word){
  if (popWord === word){ closePopup(); return; }
  popWord = word;

  const pop  = document.getElementById('wpop');
  const body = document.getElementById('wbody');

  const x = Math.min(e.clientX + 8, window.innerWidth - 275);
  const y = Math.min(e.clientY + 20, window.innerHeight - 180);
  pop.style.left = x+'px';
  pop.style.top  = y+'px';
  body.innerHTML = `<div class="wword">${word}</div><div class="wdef" style="color:var(--muted)">Looking up…</div>`;
  pop.classList.add('show');

  if (CACHE[word]){ renderPopup(CACHE[word]); return; }

  try {
    const res  = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`);
    if (!res.ok) throw new Error();
    const data = await res.json();
    CACHE[word] = data[0];
    renderPopup(data[0]);
  } catch {
    body.innerHTML = `<div class="wword">${word}</div><div class="wdef" style="color:var(--muted)">No definition found.</div>`;
  }
}

function renderPopup(entry){
  const phon = entry.phonetics?.find(p=>p.text)?.text || '';
  const meanings = (entry.meanings||[]).slice(0,2);
  let html = `<div class="wword">${entry.word}</div>`;
  if (phon) html += `<div class="wphon">${phon}</div>`;
  meanings.forEach(m => {
    const def = m.definitions?.[0]?.definition||'';
    if (def) html += `<div class="wpos">${m.partOfSpeech}</div><div class="wdef">${def}</div>`;
  });
  document.getElementById('wbody').innerHTML = html;
}

function closePopup(){
  popWord = null;
  document.getElementById('wpop').classList.remove('show');
}

document.getElementById('wclose').addEventListener('click', closePopup);
document.addEventListener('click', e => {
  const pop = document.getElementById('wpop');
  if (pop.classList.contains('show') && !pop.contains(e.target) && !e.target.classList.contains('w')) closePopup();
});

// ── Filters ───────────────────────────────────────────────────────────────────
document.querySelectorAll('.pill').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll(`.pill[data-f="${btn.dataset.f}"]`).forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    F[btn.dataset.f] = btn.dataset.v;
    render();
  });
});

document.getElementById('search').addEventListener('input', e => {
  Q = e.target.value.trim();
  render();
});

loadAll();
setInterval(loadAll, 15*60*1000);
</script>
