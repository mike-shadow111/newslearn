<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="description" content="Read real English news. Tap any word for Russian translation.">
<title>Newslearn</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ── RESET & VARS ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:      #f8f5f0;
  --surface: #ffffff;
  --border:  #e8e2d8;
  --text:    #1a1614;
  --muted:   #7a7068;
  --subtle:  #b0a89e;
  --accent:  #1a6b40;
  --accent2: #e9f2ec;
  --a2:  #d4f5e2; --a2t: #145e30;
  --b1:  #fef4c0; --b1t: #7a5500;
  --b2:  #fde0dc; --b2t: #8b2218;
  --hh: 56px; --fh: 48px;
  --serif: 'Lora', 'Georgia', serif;
  --sans:  'DM Sans', system-ui, sans-serif;
  --radius: 14px;
  --trans: .18s ease;
}
[data-theme="dark"] {
  --bg:      #111210;
  --surface: #1c1e1b;
  --border:  #2e3129;
  --text:    #e8e4dc;
  --muted:   #8a8a7e;
  --subtle:  #5a5a52;
  --accent:  #4dbd7a;
  --accent2: #1a2e1f;
  --a2:  #1a3322; --a2t: #6ee09a;
  --b1:  #302a10; --b1t: #e8c44a;
  --b2:  #300e0e; --b2t: #f08080;
}
html { font-size: 16px; scroll-behavior: smooth; }
body {
  font-family: var(--sans); background: var(--bg); color: var(--text);
  -webkit-text-size-adjust: 100%; overflow-x: hidden;
  transition: background var(--trans), color var(--trans);
}

/* ── HEADER ── */
header {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 0 1.5rem; height: var(--hh);
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 40;
  transition: background var(--trans), border-color var(--trans);
}
.logo {
  font-family: var(--serif); font-size: 1.4rem; color: var(--accent);
  cursor: pointer; user-select: none; letter-spacing: -.01em;
}
.logo span { color: var(--text); }
.header-right { display: flex; align-items: center; gap: .75rem; }
#updated { font-size: .7rem; color: var(--subtle); }
.icon-btn {
  width: 32px; height: 32px; border-radius: 50%;
  border: 1px solid var(--border); background: transparent;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: var(--muted); transition: all .12s;
  -webkit-tap-highlight-color: transparent;
}
.icon-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent2); }

/* ── FILTER BAR ── */
.fbar {
  background: var(--surface); border-bottom: 1px solid var(--border);
  position: sticky; top: var(--hh); z-index: 30;
  overflow-x: auto; scrollbar-width: none; -webkit-overflow-scrolling: touch;
  transition: background var(--trans), border-color var(--trans);
}
.fbar::-webkit-scrollbar { display: none; }
.finner {
  display: flex; align-items: center; padding: 0 1.5rem;
  height: var(--fh); min-width: max-content; gap: 0;
}
.fg { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.fg + .fg { margin-left: .85rem; padding-left: .85rem; border-left: 1px solid var(--border); }
.flabel { font-size: .62rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; margin-right: 2px; }
.pill {
  padding: 3px 10px; border-radius: 100px;
  border: 1px solid var(--border); background: transparent;
  font-family: var(--sans); font-size: .74rem; color: var(--muted);
  cursor: pointer; transition: all .12s; white-space: nowrap; line-height: 1.7;
  -webkit-tap-highlight-color: transparent;
}
.pill:hover { border-color: var(--accent); color: var(--accent); }
.pill.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 500; }
.fg-search { margin-left: auto; }
.swrap { position: relative; }
.sinput {
  padding: 4px 10px 4px 30px; border: 1.5px solid var(--accent);
  border-radius: 100px; background: var(--accent2);
  font-family: var(--sans); font-size: .78rem; color: var(--text);
  width: 155px; outline: none; transition: width .2s, box-shadow .15s;
}
.sinput::placeholder { color: var(--muted); }
.sinput:focus { width: 210px; box-shadow: 0 0 0 3px rgba(26,107,64,.12); }
.sico { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); pointer-events: none; }

/* ── MAIN ── */
.main { max-width: 1200px; margin: 0 auto; padding: 1.5rem; }
#stats { font-size: .78rem; color: var(--muted); margin-bottom: 1.1rem; }
#stats b { color: var(--text); }

/* ── RECOMMENDATION BANNER ── */
.rec-banner {
  background: var(--accent2); border: 1px solid var(--accent);
  border-radius: var(--radius); padding: .75rem 1.1rem;
  margin-bottom: 1.25rem; font-size: .8rem; color: var(--accent);
  display: flex; align-items: center; gap: .5rem;
  animation: slidedown .3s ease;
}
@keyframes slidedown { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:none} }

/* ── MASONRY — JS-driven flex columns ── */
.masonry { display: flex; gap: 1rem; align-items: flex-start; }
.mcol    { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 1rem; }

/* ── CARD ── */
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 1rem 1.15rem;
  cursor: pointer; transition: transform .13s, box-shadow .13s, background var(--trans);
  -webkit-tap-highlight-color: transparent; position: relative;
}
.card:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(0,0,0,.08); }
[data-theme="dark"] .card:hover { box-shadow: 0 6px 24px rgba(0,0,0,.3); }
.card.read { opacity: .65; }
.card.read::after {
  content: '✓'; position: absolute; top: .6rem; right: .6rem;
  font-size: .65rem; color: var(--accent); background: var(--accent2);
  padding: 1px 5px; border-radius: 100px;
}
.cmeta { display: flex; align-items: center; justify-content: space-between; margin-bottom: .45rem; }
.csrc  { font-size: .63rem; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); }
.lvl   { font-size: .63rem; font-weight: 600; padding: 2px 7px; border-radius: 100px; }
.lvl-a2{background:var(--a2);color:var(--a2t);}
.lvl-b1{background:var(--b1);color:var(--b1t);}
.lvl-b2{background:var(--b2);color:var(--b2t);}
.ctitle { font-family: var(--serif); font-size: .97rem; line-height: 1.42; font-weight: 600; color: var(--text); margin-bottom: .4rem; }
.cdesc  { font-size: .79rem; color: var(--muted); line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: .55rem; }
.cfoot  { display: flex; align-items: center; justify-content: space-between; padding-top: .5rem; border-top: 1px solid var(--border); }
.cprog  { height: 3px; border-radius: 3px; background: var(--border); margin: .45rem -.05rem 0; overflow: hidden; }
.cprog-bar { height: 100%; background: var(--accent); border-radius: 3px; transition: width .3s; }
.cdate  { font-size: .68rem; color: var(--subtle); }
.ctopic { font-size: .63rem; font-weight: 600; padding: 2px 7px; border-radius: 4px; background: var(--accent2); color: var(--accent); text-transform: capitalize; }

/* ── STATES ── */
.state { padding: 4rem 1rem; text-align: center; color: var(--muted); }
.state h3 { font-family: var(--serif); color: var(--text); margin-bottom: .4rem; font-size: 1.1rem; }
.state p  { font-size: .82rem; line-height: 1.7; max-width: 360px; margin: 0 auto; }
.spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .75s linear infinite; margin: 0 auto 1rem; }
@keyframes spin { to { transform: rotate(360deg); } }
.retry { margin-top: 1rem; padding: 7px 18px; background: var(--accent); color: #fff; border: none; border-radius: 8px; font-family: var(--sans); font-size: .82rem; font-weight: 500; cursor: pointer; }

/* ════════════════════════════════════════════
   READER — full page
   ════════════════════════════════════════════ */
.overlay {
  display: none; position: fixed; inset: 0; z-index: 50;
  background: var(--bg); overflow-y: auto; -webkit-overflow-scrolling: touch;
}
.overlay.open { display: block; animation: pagein .2s ease; }
@keyframes pagein { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }

.r-header {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 0 2rem; height: 56px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 10;
}
.r-back {
  display: flex; align-items: center; gap: .4rem;
  background: none; border: none; font-family: var(--sans);
  font-size: .82rem; color: var(--muted); cursor: pointer; padding: 6px 0;
  transition: color .12s;
}
.r-back:hover { color: var(--accent); }
.r-actions { display: flex; align-items: center; gap: .5rem; }
.r-save-btn {
  display: flex; align-items: center; gap: .35rem;
  padding: 4px 12px; border-radius: 100px;
  border: 1px solid var(--border); background: transparent;
  font-family: var(--sans); font-size: .75rem; color: var(--muted);
  cursor: pointer; transition: all .12s;
}
.r-save-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent2); }
.r-save-btn.saved { background: var(--accent); border-color: var(--accent); color: #fff; }

.r-body { max-width: 680px; margin: 0 auto; padding: 2.5rem 1.5rem 5rem; }
.r-eyebrow { display: flex; align-items: center; gap: .5rem; margin-bottom: .9rem; flex-wrap: wrap; }
.r-source { font-size: .72rem; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); }
.r-dot    { width: 3px; height: 3px; border-radius: 50%; background: var(--subtle); flex-shrink: 0; }
.r-date   { font-size: .72rem; color: var(--subtle); }
.r-title  {
  font-family: var(--serif); font-size: 2.1rem; line-height: 1.22;
  font-weight: 600; color: var(--text); margin-bottom: 1.5rem;
  letter-spacing: -.01em;
}
.r-divider { border: none; border-top: 1px solid var(--border); margin: 1.75rem 0; }
.r-hint {
  display: inline-flex; align-items: center; gap: .4rem;
  font-size: .75rem; color: var(--muted); padding: .4rem .75rem;
  background: var(--accent2); border-radius: 8px; margin-bottom: 1.75rem;
}

/* Article typography — Lora for beautiful reading */
.r-article p {
  font-family: var(--serif); font-size: 1.1rem; line-height: 1.9;
  color: var(--text); margin-bottom: 1.3rem; font-weight: 400;
}
.r-article h2 {
  font-family: var(--serif); font-size: 1.35rem; font-weight: 600;
  color: var(--text); margin: 2.25rem 0 .75rem; line-height: 1.3;
}
.r-article h3 {
  font-family: var(--serif); font-size: 1.1rem; font-weight: 400;
  font-style: italic; color: var(--text); margin: 1.75rem 0 .6rem;
}
.r-article blockquote {
  border-left: 3px solid var(--accent); padding: .75rem 1.25rem;
  margin: 1.5rem 0; font-family: var(--serif); font-size: 1.05rem;
  line-height: 1.75; font-style: italic; color: var(--muted);
  background: var(--accent2); border-radius: 0 10px 10px 0;
}
.w {
  cursor: pointer; border-radius: 3px; padding: 0 1px;
  transition: background .1s; display: inline;
  border-bottom: 1px dotted var(--subtle);
}
.w:hover { background: var(--b1); border-bottom-color: var(--accent); }

/* Skeleton loader */
.rskel { margin: 2rem 0; display: flex; flex-direction: column; gap: .85rem; }
.rskel-line { background: var(--border); border-radius: 4px; height: 14px; animation: pulse 1.3s ease infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }

.r-open-btn {
  display: inline-flex; align-items: center; gap: .45rem;
  margin-top: 2rem; padding: .65rem 1.35rem;
  background: var(--accent); color: #fff; border-radius: 10px;
  text-decoration: none; font-family: var(--sans);
  font-size: .85rem; font-weight: 500; transition: opacity .13s;
}
.r-open-btn:hover { opacity: .85; }

/* ── WORD POPUP ── */
.wpop {
  position: fixed; z-index: 60; background: var(--surface);
  border: 1px solid var(--border); border-radius: 12px;
  padding: .85rem 1rem 1.1rem; max-width: 250px;
  box-shadow: 0 8px 32px rgba(0,0,0,.14);
  opacity: 0; pointer-events: none; transition: opacity .15s;
  font-family: var(--sans);
}
.wpop.show { opacity: 1; pointer-events: auto; }
.wclose { position: absolute; top: .4rem; right: .6rem; background: none; border: none; font-size: .85rem; color: var(--muted); cursor: pointer; }
.wword  { font-family: var(--serif); font-size: 1.15rem; color: var(--text); margin-bottom: .15rem; }
.wphon  { font-size: .72rem; color: var(--muted); margin-bottom: .5rem; }
.wtrans { font-size: 1rem; font-weight: 600; color: var(--accent); margin-bottom: .25rem; }
.wex    { font-size: .75rem; color: var(--muted); font-style: italic; line-height: 1.5; }
.wsave  {
  display: flex; align-items: center; gap: .3rem; margin-top: .65rem;
  font-size: .72rem; color: var(--accent); cursor: pointer;
  background: none; border: none; font-family: var(--sans); padding: 0;
}
.wsave:hover { text-decoration: underline; }

/* ════════════════════════════════════════════
   PROFILE PANEL
   ════════════════════════════════════════════ */
.panel-overlay {
  display: none; position: fixed; inset: 0; z-index: 55;
  background: rgba(15,12,8,.55);
}
.panel-overlay.open { display: block; animation: fadein .18s ease; }
@keyframes fadein { from{opacity:0} to{opacity:1} }

.panel {
  position: fixed; right: 0; top: 0; bottom: 0; z-index: 56;
  width: min(400px, 100vw);
  background: var(--bg);
  border-left: 1.5px solid var(--border);
  box-shadow: -8px 0 40px rgba(0,0,0,.13);
  display: flex; flex-direction: column;
  animation: slidein .24s cubic-bezier(.16,1,.3,1);
  font-family: var(--sans);
}
@keyframes slidein { from{transform:translateX(100%)} to{transform:none} }

.panel-head {
  padding: 18px 20px 16px;
  border-bottom: 1.5px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.panel-head h2 {
  font-family: var(--serif); font-size: 1.15rem; font-weight: 600;
  color: var(--text); letter-spacing: -.02em;
}
.panel-close {
  width: 32px; height: 32px; border-radius: 8px;
  background: var(--surface); border: 1.5px solid var(--border);
  color: var(--muted); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background .12s, border-color .12s;
  flex-shrink: 0;
}
.panel-close:hover { background: var(--border); color: var(--text); }
.panel-close svg { width: 14px; height: 14px; }

.panel-body {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  padding: 20px;
  display: flex; flex-direction: column; gap: 24px;
}

/* ── Section label ── */
.panel-section-label {
  font-size: .68rem; font-weight: 600; text-transform: uppercase;
  letter-spacing: .09em; color: var(--subtle);
  margin-bottom: 8px;
}

/* ══════════════════════════════════════
   MASCOT WIDGET  — фиксированная высота, flex row
══════════════════════════════════════ */
.mascot-widget {
  display: flex;
  flex-direction: row;
  align-items: stretch;
  border-radius: 16px;
  overflow: hidden;
  border: 1.5px solid #c3dfc9;
  background: #edf6f0;
  height: 152px;
}
[data-theme="dark"] .mascot-widget {
  background: #101e14;
  border-color: #1c3222;
}
.mascot-img-col {
  width: 118px;
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
  background: #e2f0e7;
}
[data-theme="dark"] .mascot-img-col { background: #0d1a10; }
.mascot-img {
  position: absolute;
  bottom: 0; left: 50%;
  transform: translateX(-50%);
  height: 160px;
  width: auto;
  object-fit: contain;
  user-select: none;
  pointer-events: none;
}
.mascot-copy {
  flex: 1;
  padding: 18px 16px 16px 14px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 5px;
  border-left: 1px solid #c3dfc9;
}
[data-theme="dark"] .mascot-copy { border-left-color: #1c3222; }
.mascot-eyebrow {
  font-family: var(--sans);
  font-size: .65rem;
  font-weight: 600;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--accent);
  opacity: .75;
}
.mascot-headline {
  font-family: var(--serif);
  font-size: 1.6rem;
  font-weight: 600;
  color: var(--accent);
  line-height: 1;
  letter-spacing: -.03em;
}
.mascot-headline small {
  font-family: var(--sans);
  font-size: .72rem;
  font-weight: 400;
  color: var(--muted);
  letter-spacing: 0;
  display: block;
  margin-top: 2px;
}
.mascot-phrase {
  font-family: var(--serif);
  font-size: .88rem;
  font-style: italic;
  color: var(--text);
  line-height: 1.4;
  margin-top: 2px;
}

/* ══════════════════════════════════════
   STATS STRIP — горизонтальная полоса
══════════════════════════════════════ */
.stats-strip {
  display: grid;
  grid-template-columns: 1fr 1px 1fr 1px 1fr;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
}
.stats-divider {
  background: var(--border);
  align-self: stretch;
}
.pstat {
  padding: 14px 8px;
  text-align: center;
}
.pstat-n {
  font-family: var(--serif);
  font-size: 1.5rem;
  font-weight: 600;
  color: var(--accent);
  line-height: 1;
}
.pstat-l {
  font-size: .62rem;
  color: var(--muted);
  margin-top: 4px;
  font-family: var(--sans);
}

/* ══════════════════════════════════════
   PROGRESS BLOCK (уровень + стрик + цель)
══════════════════════════════════════ */
.progress-block {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
}
.progress-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 13px 16px;
  gap: 12px;
  border-bottom: 1px solid var(--border);
  min-height: 56px;
}
.progress-row:last-child { border-bottom: none; }

/* левая часть строки */
.pr-left {
  display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0;
}
.pr-icon {
  width: 34px; height: 34px; border-radius: 9px;
  background: var(--accent2);
  border: 1.5px solid #c3dfc9;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
[data-theme="dark"] .pr-icon { background: #0d1a10; border-color: #1c3222; }
.pr-icon svg { width: 16px; height: 16px; color: var(--accent); }
.pr-label { font-size: .875rem; font-weight: 500; color: var(--text); white-space: nowrap; }
.pr-sub   { font-size: .7rem; color: var(--muted); margin-top: 1px; }

/* правая часть — значение */
.pr-value {
  font-family: var(--serif);
  font-size: 1.15rem;
  font-weight: 600;
  color: var(--accent);
  white-space: nowrap;
  flex-shrink: 0;
}

/* прогресс-бар уровня внутри строки */
.pr-level-right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 5px;
  flex-shrink: 0;
  min-width: 96px;
}
.pr-level-badge {
  font-family: var(--sans);
  font-size: .68rem;
  font-weight: 600;
  letter-spacing: .06em;
  text-transform: uppercase;
  background: var(--accent);
  color: #fff;
  border-radius: 5px;
  padding: 2px 7px;
}
.pr-bar-track {
  width: 96px; height: 5px;
  border-radius: 99px;
  background: var(--border);
  overflow: hidden;
}
.pr-bar-fill {
  height: 100%; border-radius: 99px;
  background: var(--accent);
  transition: width .5s ease;
}
.pr-bar-hint {
  font-size: .62rem;
  color: var(--muted);
  white-space: nowrap;
}

/* точки дневной цели */
.goal-dots { display: flex; gap: 4px; align-items: center; flex-shrink: 0; }
.goal-dot {
  width: 22px; height: 6px; border-radius: 99px;
  background: var(--border);
  transition: background .2s;
}
.goal-dot.done { background: var(--accent); }

/* ══════════════════════════════════════
   ACHIEVEMENTS — 2 колонки, без emoji
══════════════════════════════════════ */
.achievements-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.ach-item {

<script>
// ════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════
let ALL = [], ARTICLES = [];
let F = {level:new Set(), topic:'all', source:'all'}, Q = '';
let DICT = {}, popWord = null, currentArticleIdx = null;

// ── localStorage helpers ──────────────────────────────────────────────────────
const LS = {
  get: k => { try { return JSON.parse(localStorage.getItem('nl_'+k)); } catch { return null; } },
  set: (k,v) => { try { localStorage.setItem('nl_'+k, JSON.stringify(v)); } catch {} },
};

// ── Profile data ──────────────────────────────────────────────────────────────
function getProfile() {
  return LS.get('profile') || {
    darkMode:     false,
    targetLevel:  'b1',
    topicWeights: { technology:1, science:1, health:1.2, business:1, sport:1.2, culture:1.2, world:0.8 },
    sourceWeights: {},
    readArticles: [],   // array of urls
    savedArticles:[],   // array of urls
    savedWords:   [],   // [{word, translation}]
    wordsLearned: 0,
    streak:       0,
    lastVisit:    null,
  };
}
function saveProfile(p) { LS.set('profile', p); }

// ── Streak tracking ───────────────────────────────────────────────────────────
function updateStreak() {
  const p = getProfile();
  const today = new Date().toDateString();
  if (p.lastVisit === today) return;
  const yesterday = new Date(Date.now() - 86400000).toDateString();
  p.streak = (p.lastVisit === yesterday) ? (p.streak + 1) : 1;
  p.lastVisit = today;
  saveProfile(p);
}
updateStreak();

// ════════════════════════════════════════════
// DARK MODE
// ════════════════════════════════════════════
function applyTheme(dark) {
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : '');
  const icon = document.getElementById('theme-icon');
  icon.innerHTML = dark
    ? '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>'
    : '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
}
(function() {
  const p = getProfile();
  applyTheme(p.darkMode);
})();
document.getElementById('theme-btn').addEventListener('click', () => {
  const p = getProfile();
  p.darkMode = !p.darkMode;
  saveProfile(p);
  applyTheme(p.darkMode);
});

// ════════════════════════════════════════════
// UTILS
// ════════════════════════════════════════════
function h(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function clean(s) {
  return String(s||'')
    .replace(/<style[\s\S]*?<\/style>/gi,'').replace(/<script[\s\S]*?<\/script>/gi,'')
    .replace(/<br\s*\/?>/gi,' ').replace(/<\/p>/gi,' ').replace(/<[^>]+>/g,'')
    .replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>')
    .replace(/&quot;/g,'"').replace(/&apos;/g,"'").replace(/&nbsp;/g,' ')
    .replace(/&#x2019;|&#8217;/g,"'").replace(/&#x2018;|&#8216;/g,"'")
    .replace(/&#x201C;|&#8220;/g,'"').replace(/&#x201D;|&#8221;/g,'"')
    .replace(/&#x2013;|&#8211;/g,'–').replace(/&#x2014;|&#8212;/g,'—')
    .replace(/&#[xX][0-9a-fA-F]+;/g,'').replace(/&#\d+;/g,'').replace(/&[a-z]+;/g,' ')
    .replace(/(Sign up|Subscribe|Get our|Newsletter)[^.!\n]{0,200}[.!]?/gi,'')
    .replace(/https?:\/\/\S+/g,'').replace(/\s+/g,' ').trim();
}

function fmtDate(s) {
  const d = new Date(s);
  return isNaN(d.getTime()) ? '' : d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
}

function isJunk(a) {
  if (!a.title || a.title.length < 20) return true;
  if (!a.url || !a.url.startsWith('http')) return true;
  if (a.title.trim().split(/\s+/).length < 4) return true;
  return false;
}

function colCount() {
  return window.innerWidth < 641 ? 1 : window.innerWidth < 961 ? 2 : 3;
}

// ════════════════════════════════════════════
// RECOMMENDATION ENGINE
// ════════════════════════════════════════════
// ════════════════════════════════════════════
// RECOMMENDATION ENGINE v2 — YouTube-style
// ════════════════════════════════════════════

// Extract meaningful keywords from title (for entity matching)
function extractEntities(title) {
  const stop = new Set(['the','a','an','and','or','but','in','on','at','to','for','of','with',
    'by','as','is','are','was','were','has','have','had','will','be','this','that','it',
    'its','says','said','new','over','after','from','into','about','up','how','why','what',
    'who','when','could','would','more','most','just','not','no','also']);
  return title.toLowerCase()
    .replace(/[^a-z0-9\s]/g, ' ')
    .split(/\s+/)
    .filter(w => w.length > 3 && !stop.has(w));
}

// Cosine-ish overlap between two keyword arrays
function entityOverlap(aWords, bWords) {
  if (!aWords.length || !bWords.length) return 0;
  const bSet = new Set(bWords);
  const hits = aWords.filter(w => bSet.has(w)).length;
  return hits / Math.sqrt(aWords.length * bWords.length);
}

// Apply time-decay to weights — pull everything toward 1.0 slowly
function decayWeights(weights, daysSince) {
  const decayed = {};
  const factor = Math.pow(0.97, daysSince); // ~3% decay per day
  for (const [k, v] of Object.entries(weights)) {
    if (k.startsWith('_')) { decayed[k] = v; continue; }
    decayed[k] = 1 + (v - 1) * factor; // decay toward 1
  }
  return decayed;
}

function scoreArticle(a, p, recentEntities, sourceCount) {
  let score = 0;

  // 1. Topic affinity (learned)
  score += (p.topicWeights[a.topic] || 1) * 12;

  // 2. Source affinity
  score += (p.sourceWeights?.[a.source] || 1) * 8;

  // 3. Entity/keyword match with recently read articles
  if (recentEntities.length) {
    const aWords = extractEntities(a.title + ' ' + (a.desc || ''));
    const overlap = entityOverlap(recentEntities, aWords);
    score += overlap * 25; // strong signal — same topic/country/person
  }

  // 4. Level fit
  const levels = ['a2','b1','b2'];
  const tIdx = levels.indexOf(p.targetLevel);
  const aIdx = levels.indexOf(a.level);
  if (aIdx === tIdx)     score += 6;
  else if (aIdx === tIdx - 1) score += 3;
  else if (aIdx === tIdx + 1) score += 2;
  else score -= 4; // two levels off

  // 5. Already read — heavy penalty
  if (p.readArticles.includes(a.url)) score -= 50;

  // 6. Server priority (violence/politics = 0, educational = 2)
  score += (a.priority ?? 1) * 4;

  // 7. Freshness (up to +6 for <1h, fades over 48h)
  const ageH = (Date.now() - new Date(a.date)) / 3600000;
  score += Math.max(0, 6 - ageH * 0.12);

  // 8. Source diversity — penalize if this source already has many in top results
  const srcCount = sourceCount[a.source] || 0;
  if (srcCount >= 3) score -= (srcCount - 2) * 5;

  return score;
}

function sortByRecommendation(list) {
  const p = getProfile();

  // Apply time-decay since last visit
  const now = Date.now();
  const lastDecay = p._lastDecay || now;
  const daysSince = (now - lastDecay) / 86400000;
  if (daysSince > 0.5) { // decay at most twice a day
    p.topicWeights  = decayWeights(p.topicWeights || {}, daysSince);
    p.sourceWeights = decayWeights(p.sourceWeights || {}, daysSince);
    p._lastDecay = now;
    saveProfile(p);
  }

  // Build entity pool from last 8 read articles
  const recentUrls = (p.readArticles || []).slice(0, 8);
  const recentEntities = [];
  for (const url of recentUrls) {
    const art = ALL.find(a => a.url === url);
    if (art) recentEntities.push(...extractEntities(art.title + ' ' + (art.desc || '')));
  }

  // Score all articles
  const scored = list.map(a => ({ a, s: scoreArticle(a, p, recentEntities, {}) }));
  scored.sort((x, y) => y.s - x.s);

  // Re-score with diversity constraint (pass 2)
  const sourceCount = {};
  return scored.map(({ a }) => {
    sourceCount[a.source] = (sourceCount[a.source] || 0) + 1;
    return a;
  });
}

// Called when user opens an article — update all signals
function recordInterest(topic, level, source, title, desc, readDepth) {
  const p = getProfile();
  if (!p.sourceWeights) p.sourceWeights = {};

  // Topic weight — stronger signal if deep read
  const topicBoost = readDepth > 0.5 ? 1.25 : 1.12;
  p.topicWeights[topic] = Math.min(4, (p.topicWeights[topic] || 1) * topicBoost);

  // Source weight
  const srcBoost = readDepth > 0.5 ? 1.2 : 1.08;
  p.sourceWeights[source] = Math.min(4, (p.sourceWeights[source] || 1) * srcBoost);

  // Gradually upgrade target level
  const levels = ['a2','b1','b2'];
  const tIdx = levels.indexOf(p.targetLevel);
  const aIdx = levels.indexOf(level);
  if (aIdx > tIdx) {
    p._levelProgress = (p._levelProgress || 0) + (readDepth > 0.5 ? 2 : 1);
    if (p._levelProgress >= 6) {
      p.targetLevel = levels[Math.min(tIdx + 1, 2)];
      p._levelProgress = 0;
    }
  }

  saveProfile(p);
}

function markAsRead(url) {
  const p = getProfile();
  if (!p.readArticles.includes(url)) {
    p.readArticles.unshift(url);
    if (p.readArticles.length > 200) p.readArticles = p.readArticles.slice(0,200);
    // Track daily reads for goal widget
    if (!p.readDates) p.readDates = [];
    p.readDates.push(new Date().toDateString());
    if (p.readDates.length > 500) p.readDates = p.readDates.slice(-500);
    saveProfile(p);
  }
}

// ════════════════════════════════════════════
// RENDER
// ════════════════════════════════════════════
function filtered() {
  const p = getProfile();
  return ALL.filter(a => {
    if (isJunk(a)) return false;
    if (p.hideRead && p.readArticles.includes(a.url)) return false;
    if (p.levelFilter && a.level !== (p.targetLevel || 'b1')) return false;
    if (F.level.size > 0 && !F.level.has(a.level)) return false;
    if (F.topic  !== 'all' && a.topic  !== F.topic)  return false;
    if (F.source !== 'all' && a.source !== F.source) return false;
    if (Q) {
      const q = Q.toLowerCase();
      if (!a.title.toLowerCase().includes(q) && !(a.desc||'').toLowerCase().includes(q)) return false;
    }
    return true;
  });
}

function render() {
  const profile = getProfile();
  let list = filtered();

  // Apply recommendation sort when no manual filters active
  if (F.level.size === 0 && F.topic === 'all' && F.source === 'all' && !Q) {
    list = sortByRecommendation(list);
    // Show recommendation banner with smart insight
    const p2 = getProfile();
    const topTopic = Object.entries(p2.topicWeights || {})
      .filter(([k]) => !k.startsWith('_') && typeof p2.topicWeights[k] === 'number')
      .sort((a,b) => b[1]-a[1])[0];
    const topSource = Object.entries(p2.sourceWeights || {})
      .sort((a,b) => b[1]-a[1])[0];
    const lowSource = Object.entries(p2.sourceWeights || {})
      .filter(([,v]) => v < 0.8).sort((a,b) => a[1]-b[1])[0];

    let bannerText = '';
    if (topTopic && topTopic[1] > 1.3) {
      bannerText = `Showing more ${topTopic[0]}`;
      if (topSource && topSource[1] > 1.2) bannerText += ` · Favouring ${topSource[0]}`;
      if (lowSource) bannerText += ` · Less ${lowSource[0]}`;
    }
    if (bannerText) {
      document.getElementById('rec-banner').style.display = 'flex';
      document.getElementById('rec-text').textContent = bannerText;
    } else {
      document.getElementById('rec-banner').style.display = 'none';
    }
  } else {
    document.getElementById('rec-banner').style.display = 'none';
  }

  const total = ALL.filter(a => !isJunk(a)).length;
  document.getElementById('stats').innerHTML =
    list.length === total ? `<b>${list.length}</b> articles` : `<b>${list.length}</b> of <b>${total}</b> articles`;

  if (!list.length) {
    document.getElementById('root').innerHTML = '<div class="state"><h3>No results</h3><p>Try different filters.</p></div>';
    return;
  }

  const n = colCount();
  const cols = Array.from({length:n}, () => []);
  list.forEach((a, i) => cols[i % n].push(a));

  function cardHtml(a) {
    const idx  = ARTICLES.indexOf(a);
    const desc = clean(a.desc||'');
    const read = profile.readArticles.includes(a.url);
    const pct  = (LS.get('progress') || {})[a.url] || 0;
    const progBar = (pct > 2 && pct < 95)
      ? `<div class="cprog"><div class="cprog-bar" style="width:${pct}%"></div></div>`
      : '';
    return `<div class="card${read?' read':''}" data-idx="${idx}" role="button" tabindex="0" aria-label="${h(a.title)}">
      <div class="cmeta"><span class="csrc">${h(a.source)}</span><span class="lvl lvl-${a.level}">${a.level.toUpperCase()}</span></div>
      <div class="ctitle">${h(clean(a.title))}</div>
      ${desc ? `<div class="cdesc">${h(desc)}</div>` : ''}
      <div class="cfoot"><span class="cdate">${fmtDate(a.date)}</span><span class="ctopic">${h(a.topic)}</span></div>
      ${progBar}
    </div>`;
  }

  document.getElementById('root').innerHTML =
    `<div class="masonry">${cols.map(col=>`<div class="mcol">${col.map(cardHtml).join('')}</div>`).join('')}</div>`;

  document.querySelectorAll('.card[data-idx]').forEach(el => {
    const open = () => openReader(parseInt(el.dataset.idx));
    el.addEventListener('click', open);
    el.addEventListener('keydown', e => { if (e.key==='Enter'||e.key===' ') open(); });
  });
}

async function loadAll() {
  document.getElementById('stats').textContent = '';
  document.getElementById('root').innerHTML = '<div class="state"><div class="spinner"></div><h3>Loading articles…</h3></div>';
  try {
    const res  = await fetch('/api/news');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    ARTICLES = data.articles || [];
    ALL = ARTICLES;
    document.getElementById('updated').textContent =
      'Updated ' + new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
    render();
  } catch(e) {
    document.getElementById('root').innerHTML =
      `<div class="state"><h3>Could not load</h3><p>${e.message}</p><button class="retry" onclick="loadAll()">Retry</button></div>`;
  }
}

async function openReader(idx) {
  const a = ARTICLES[idx];
  if (!a) return;
  currentArticleIdx = idx;

  // Update save button
  updateSaveBtn(a.url);

  // Badge
  const badge = document.getElementById('r-lvl-badge');
  badge.className = `lvl lvl-${a.level}`;
  badge.textContent = a.level.toUpperCase();

  // Show skeleton
  document.getElementById('r-body').innerHTML = skeletonHtml(a);
  document.getElementById('overlay').classList.add('open');
  document.getElementById('overlay').scrollTop = 0;
  document.body.style.overflow = 'hidden';

  // Track reading
  markAsRead(a.url);
  const _readDepth = (LS.get('progress') || {})[a.url] / 100 || 0;
  recordInterest(a.topic, a.level, a.source, a.title, a.desc || '', _readDepth);

  // Scroll progress — stored in separate LS key to avoid profile conflicts
  const overlay = document.getElementById('overlay');
  overlay._progressUrl = a.url;
  if (overlay._progressHandler) {
    overlay.removeEventListener('scroll', overlay._progressHandler);
    overlay._progressHandler = null;
  }
  let _scrollTimer = null;
  const _saveProgress = () => {
    if (_scrollTimer) return;
    _scrollTimer = setTimeout(() => {
      _scrollTimer = null;
      // Try overlay scroll, fall back to window scroll
      const scrolled = overlay.scrollTop || window.scrollY || 0;
      const total    = (overlay.scrollHeight - overlay.clientHeight) || (document.body.scrollHeight - window.innerHeight);
      if (total < 50) return;
      const pct = Math.min(99, Math.round((scrolled / total) * 100));
      if (pct < 3) return;
      const prog = LS.get('progress') || {};
      const url  = overlay._progressUrl;
      if (pct > (prog[url] || 0)) {
        prog[url] = pct;
        LS.set('progress', prog);
      }
    }, 250);
  };
  overlay._progressHandler = _saveProgress;
  overlay.addEventListener('scroll', _saveProgress, { passive: true });
  window.addEventListener('scroll',  _saveProgress, { passive: true });

  // Fetch full article
  try {
    const res  = await fetch('/api/article?url=' + encodeURIComponent(a.url));
    const data = await res.json();
    if (data.ok && data.blocks && data.blocks.length >= 2) {
      renderArticle(a, data.blocks);
    } else {
      renderFallback(a);
    }
  } catch { renderFallback(a); }
}

function skeletonHtml(a) {
  return `<div class="r-eyebrow">
    <span class="r-source">${h(a.source)}</span>
    <span class="r-dot"></span><span class="r-date">${fmtDate(a.date)}</span>
  </div>
  <div class="r-title">${h(clean(a.title))}</div>
  <hr class="r-divider">
  <div class="rskel">
    ${[100,93,97,88,100,91,95,86,100,89].map(w=>`<div class="rskel-line" style="width:${w}%"></div>`).join('')}
  </div>`;
}

function readerTop(a) {
  return `<div class="r-eyebrow">
    <span class="r-source">${h(a.source)}</span>
    <span class="r-dot"></span>
    <span class="r-date">${fmtDate(a.date)}</span>
    <span class="r-dot"></span>
    <span class="ctopic">${h(a.topic)}</span>
  </div>
  <div class="r-title">${h(clean(a.title))}</div>
  <hr class="r-divider">
  <div class="r-hint">💡 Tap any word for Russian translation</div>`;
}

function tokenize(text) {
  return text.split(/(\b)/).map(tok =>
    /^[a-zA-Z]{2,}$/.test(tok)
      ? `<span class="w" data-word="${tok.toLowerCase()}">${tok}</span>`
      : tok
  ).join('');
}

function blocksHtml(blocks) {
  return '<div class="r-article">' + blocks.map(b => {
    const t = tokenize(b.text);
    if (b.tag==='h1'||b.tag==='h2') return `<h2>${t}</h2>`;
    if (b.tag==='h3'||b.tag==='h4') return `<h3>${t}</h3>`;
    if (b.tag==='blockquote') return `<blockquote>${t}</blockquote>`;
    return `<p>${t}</p>`;
  }).join('') + '</div>';
}

function openBtn(url) {
  return `<a class="r-open-btn" href="${h(url)}" target="_blank" rel="noopener noreferrer">
    Open original
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
  </a>`;
}

function renderArticle(a, blocks) {
  document.getElementById('r-body').innerHTML =
    readerTop(a) + blocksHtml(blocks) + '<hr class="r-divider">' + openBtn(a.url);
  attachWordHandlers();
}

function renderFallback(a) {
  const desc = clean(a.desc||'');
  document.getElementById('r-body').innerHTML =
    readerTop(a) +
    (desc ? `<div class="r-article"><p>${tokenize(desc)}</p></div><hr class="r-divider">` : '') +
    openBtn(a.url);
  attachWordHandlers();
}

// ── Selection-translate button ──────────────────────────────────────────────
let _selBtn = null;
function removeSelBtn() {
  if (_selBtn) { _selBtn.remove(); _selBtn = null; }
}

function attachWordHandlers() {
  document.querySelectorAll('#r-body .w').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      removeSelBtn();
      const para = el.closest('p,blockquote');
      const context = para ? para.textContent.trim() : '';
      lookupWord(e, el.dataset.word, null, context);
    });
  });

  const rbody = document.getElementById('r-body');
  rbody.addEventListener('mouseup', () => setTimeout(handleSelection, 10));
  rbody.addEventListener('touchend', () => setTimeout(handleSelection, 50));
}

function handleSelection() {
  removeSelBtn();
  const sel = window.getSelection();
  const phrase = sel ? sel.toString().trim() : '';
  if (phrase.length < 3 || phrase.length > 150) return;

  const rbody = document.getElementById('r-body');
  if (!sel.rangeCount) return;
  const range = sel.getRangeAt(0);
  const container = range.commonAncestorContainer;
  if (!rbody.contains(container)) return;

  const para = container.nodeType === 3
    ? container.parentElement.closest('p,blockquote,h2,h3')
    : container.closest('p,blockquote,h2,h3');
  const context = para ? para.textContent.trim() : '';

  const rect = range.getBoundingClientRect();
  const btn = document.createElement('button');
  btn.id = 'sel-translate-btn';
  btn.textContent = '⬇ Translate';
  btn.style.cssText = `
    position:fixed;
    left:${Math.min(rect.left + rect.width/2 - 55, window.innerWidth - 130)}px;
    top:${rect.bottom + 6}px;
    z-index:9999;
    background:var(--accent);color:#fff;
    border:none;border-radius:100px;
    padding:5px 14px;font-size:.75rem;
    font-family:var(--sans);font-weight:600;
    cursor:pointer;box-shadow:0 2px 12px rgba(0,0,0,.18);
    white-space:nowrap;
  `;
  document.body.appendChild(btn);
  _selBtn = btn;

  btn.addEventListener('click', e => {
    e.stopPropagation();
    const fakeE = { clientX: rect.left + rect.width/2, clientY: rect.bottom };
    removeSelBtn();
    sel.removeAllRanges();
    lookupWord(fakeE, phrase, null, context);
  });
}

document.addEventListener('mousedown', e => {
  if (_selBtn && e.target !== _selBtn) removeSelBtn();
});

function closeReader() {
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
  // Negative signal: if user barely read (<5%), slightly down-weight source/topic
  if (currentArticleIdx !== null) {
    const a = ARTICLES[currentArticleIdx];
    if (a) {
      const depth = (LS.get('progress') || {})[a.url] / 100 || 0;
      if (depth < 0.05) {
        const p = getProfile();
        if (!p.sourceWeights) p.sourceWeights = {};
        p.topicWeights[a.topic]   = Math.max(0.3, (p.topicWeights[a.topic]   || 1) * 0.93);
        p.sourceWeights[a.source] = Math.max(0.3, (p.sourceWeights[a.source] || 1) * 0.93);
        saveProfile(p);
      }
    }
  }
  currentArticleIdx = null;
  closePopup();
  render();
}

// Save article
function updateSaveBtn(url) {
  const p = getProfile();
  const saved = p.savedArticles.includes(url);
  const btn = document.getElementById('r-save-btn');
  const lbl = document.getElementById('r-save-label');
  btn.classList.toggle('saved', saved);
  lbl.textContent = saved ? 'Saved' : 'Save';
}

document.getElementById('r-save-btn').addEventListener('click', () => {
  const a = currentArticleIdx !== null ? ARTICLES[currentArticleIdx] : null;
  if (!a) return;
  const p = getProfile();
  const idx = p.savedArticles.indexOf(a.url);

  else p.savedArticles.splice(idx, 1);

// ════════════════════════════════════════════
// WORD TRANSLATION
// ════════════════════════════════════════════
async function lookupWord(e, word, _unused, context) {
  const key = word;
  if (popWord === key) { closePopup(); return; }
  popWord = key;

  const pop  = document.getElementById('wpop');
  const body = document.getElementById('wbody');

  const x = Math.min(e.clientX + 8, window.innerWidth - 265);
  const y = Math.min(e.clientY + 20, window.innerHeight - 200);
  pop.style.left = x + 'px';
  pop.style.top  = y + 'px';
  body.innerHTML = `<div class="wword">${h(key)}</div><div class="wphon" style="color:var(--muted)">Translating…</div>`;
  pop.classList.add('show');

  if (!context && DICT[key]) { showTranslation(key, DICT[key]); return; }

  const isPhrase = key.includes(' ');

  try {
    let tr = '';

    if (isPhrase || context) {
      // Use /api/translate with context for better results
      const q = context ? key + '|||' + context : key;
      try {
        const res = await fetch('/api/translate?q=' + encodeURIComponent(q));
        if (res.ok) {
          const data = await res.json();
          if (data.ok && data.translation) tr = data.translation;
        }
      } catch(e2) { /* fall through */ }
    }

    if (!tr) {
      const res = await fetch(
        `https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=ru&dt=t&q=${encodeURIComponent(key)}`,
        { headers: { 'Accept': 'application/json' } }
      );
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      if (Array.isArray(data) && Array.isArray(data[0])) {
        tr = data[0].filter(x => Array.isArray(x) && x[0]).map(x => x[0]).join('');
      }
    }

    if (!tr || tr.toLowerCase().trim() === key.toLowerCase().trim()) throw new Error('no translation');
    const entry = { word: key, translation: tr };
    if (!context) DICT[key] = entry;
    showTranslation(key, entry);
  } catch(err) {
    console.error('translate error:', err);
    body.innerHTML = `<div class="wword">${h(key)}</div><div class="wphon" style="color:var(--muted)">Перевод не найден</div>`;
  }
}

function showTranslation(word, entry) {
  const p = getProfile();
  const isSaved = p.savedWords.some(w => w.word === word);
  document.getElementById('wbody').innerHTML =
    `<div class="wword">${entry.word}</div>
     <div class="wtrans">${entry.translation || '—'}</div>
     <button class="wsave" id="wsave-btn">
       ${isSaved ? '✓ Saved to vocabulary' : '+ Save to vocabulary'}
     </button>`;
  document.getElementById('wsave-btn').addEventListener('click', () => {
    saveWord(word, entry.translation);
    document.getElementById('wsave-btn').textContent = '✓ Saved to vocabulary';
  });
}

function saveWord(word, translation) {
  const p = getProfile();
  if (p.savedWords.some(w => w.word === word)) return;
  p.savedWords.unshift({ word, translation });
  if (p.savedWords.length > 500) p.savedWords = p.savedWords.slice(0,500);
  p.wordsLearned++;
  saveProfile(p);
}

function closePopup() {
  popWord = null;
  document.getElementById('wpop').classList.remove('show');
}
document.getElementById('wclose').addEventListener('click', closePopup);
document.addEventListener('click', e => {
  const pop = document.getElementById('wpop');
  if (pop.classList.contains('show') && !pop.contains(e.target) && !e.target.classList.contains('w')) closePopup();
});

    return Math.max(1, Math.floor(ms / 86400000));

    technology: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>',
    science:    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M9 3v11l-5 5h16l-5-5V3"/><path d="M6 8h12"/></svg>',
    health:     '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>',
    business:   '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>',
    sport:      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M4.93 4.93 12 12M19.07 4.93 12 12M12 12l7.07 7.07M12 12l-7.07 7.07"/></svg>',
    culture:    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M2 20h20M4 20V10l8-7 8 7v10"/><path d="M10 20v-5h4v5"/></svg>',
    world:      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20A14.5 14.5 0 0 0 12 2"/><path d="M2 12h20"/></svg>',
  };

  // ── Saved words HTML ──────────────────────────────────────────────────
  const wordsHtml = p.savedWords.length === 0
    ? `<div class="empty-state">Пока нет слов.<br>Нажми на любое слово при чтении.</div>`
    : p.savedWords.slice(0,50).map(w =>
        `<div class="word-item">
          <div><div class="word-en">${h(w.word)}</div><div class="word-ru">${h(w.translation||'')}</div></div>
          <button class="word-del" data-word="${h(w.word)}" title="Удалить" aria-label="Удалить слово ${h(w.word)}">✕</button>
        </div>`
      ).join('');

  // ── Render ────────────────────────────────────────────────────────────
  document.getElementById('panel-body').innerHTML = `

    <!-- ① MASCOT WIDGET -->
    ${p.showWidgets !== false ? `
    <div class="mascot-widget">
      <div class="mascot-img-col">
        <img class="mascot-img" src="mascot.jpg" alt="Маскот Newslearn" loading="lazy">
      </div>
      <div class="mascot-copy">
        <div class="mascot-eyebrow">Ваш прогресс</div>
        <div class="mascot-headline">
          ${daysWithUs}
          <small>дней с&nbsp;Newslearn</small>
        </div>
        <div class="mascot-phrase">${getMascotPhrase(daysWithUs)}</div>
      </div>
    </div>` : ''}

    <!-- ② STATS STRIP -->
    <div class="stats-strip">
      <div class="pstat">
        <div class="pstat-n">${p.readArticles.length}</div>
        <div class="pstat-l">Статей</div>
      </div>
      <div class="stats-divider"></div>
      <div class="pstat">
        <div class="pstat-n">${p.savedWords.length}</div>
        <div class="pstat-l">Слов</div>
      </div>
      <div class="stats-divider"></div>
      <div class="pstat">
        <div class="pstat-n">${p.savedArticles ? p.savedArticles.length : 0}</div>
        <div class="pstat-l">Закладки</div>
      </div>
    </div>

    <!-- ③ PROGRESS BLOCK: уровень + стрик + цель за день -->
    ${p.showWidgets !== false ? `
    <div class="progress-block">

      <!-- Уровень английского -->
      <div class="progress-row">
        <div class="pr-left">
          <div class="pr-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 20h20M7 20V10l5-7 5 7v10"/><path d="M12 20v-6"/></svg>
          </div>
          <div>
            <div class="pr-label">Уровень английского</div>
            <div class="pr-sub">Прогресс к следующему</div>
          </div>
        </div>
        <div class="pr-level-right">
          <div class="pr-level-badge">${curLvl}</div>
          <div class="pr-bar-track" role="progressbar" aria-valuenow="${xpPct}" aria-valuemin="0" aria-valuemax="100">
            <div class="pr-bar-fill" style="width:${xpPct}%"></div>
          </div>
          <div class="pr-bar-hint">${xp} / ${xpMax} очков</div>
        </div>
      </div>

      <!-- Серия дней -->
      <div class="progress-row">
        <div class="pr-left">
          <div class="pr-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>
          </div>
          <div>
            <div class="pr-label">Серия дней</div>
            <div class="pr-sub">Читайте каждый день</div>
          </div>
        </div>
        <div class="pr-value">${p.streak}&nbsp;<span style="font-size:.75rem;font-weight:400;color:var(--muted);font-family:var(--sans)">${p.streak===1?'день':p.streak<5?'дня':'дней'}</span></div>
      </div>

      <!-- Цель на сегодня -->
      <div class="progress-row">
        <div class="pr-left">
          <div class="pr-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
          </div>
          <div>
            <div class="pr-label">Цель на сегодня</div>
            <div class="pr-sub">${goalPct} из ${DAILY_GOAL} статей прочитано</div>
          </div>
        </div>
        <div class="goal-dots" aria-label="Дневная цель" role="progressbar" aria-valuenow="${goalPct}" aria-valuemax="${DAILY_GOAL}">
          ${Array.from({length: DAILY_GOAL}, (_,i) =>
            `<div class="goal-dot${i < goalPct ? ' done' : ''}"></div>`
          ).join('')}
        </div>
      </div>

    </div>` : ''}

    <!-- ④ ACHIEVEMENTS -->
    <div>
      <div class="panel-section-label">Достижения</div>
      <div class="achievements-grid">
        ${achievements.map(a => `
          <div class="ach-item ${a.unlocked ? 'unlocked' : 'locked'}" aria-label="${a.name}${a.unlocked ? ' — получено' : ''}">
            <div class="ach-icon-wrap">${a.svg}</div>
            <div class="ach-text">
              <div class="ach-name">${a.name}</div>
              <div class="ach-hint">${a.hint}</div>
            </div>
          </div>`).join('')}
      </div>
    </div>

    <!-- ⑤ SETTINGS -->
    <div>
      <div class="panel-section-label">Настройки</div>
      <div class="settings-block">

        <div class="setting-row">
          <div style="display:flex;align-items:center;gap:10px">
            <div class="setting-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            </div>
            <div class="setting-label">Тёмная тема</div>
          </div>
          <label class="toggle" aria-label="Тёмная тема">
            <input type="checkbox" id="dark-toggle" ${p.darkMode?'checked':''}>
            <div class="toggle-track"></div>
          </label>
        </div>

        <div class="setting-row">
          <div style="display:flex;align-items:center;gap:10px">
            <div class="setting-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </div>
            <div>
              <div class="setting-label">Скрывать прочитанное</div>
              <div class="setting-sub">Убирать из ленты</div>
            </div>
          </div>
          <label class="toggle" aria-label="Скрывать прочитанное">
            <input type="checkbox" id="hide-read-toggle" ${p.hideRead?'checked':''}>
            <div class="toggle-track"></div>
          </label>
        </div>

        <div class="setting-row">
          <div style="display:flex;align-items:center;gap:10px">
            <div class="setting-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
            </div>
            <div>
              <div class="setting-label">Только мой уровень</div>
              <div class="setting-sub">Фильтровать ленту по ${curLvl.toUpperCase()}</div>
            </div>
          </div>
          <label class="toggle" aria-label="Фильтр по уровню">
            <input type="checkbox" id="level-filter-toggle" ${p.levelFilter?'checked':''}>
            <div class="toggle-track"></div>
          </label>
        </div>

        <div class="setting-row">
          <div style="display:flex;align-items:center;gap:10px">
            <div class="setting-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
            </div>
            <div>
              <div class="setting-label">Визуальные элементы</div>
              <div class="setting-sub">Маскот и прогресс-блок</div>
            </div>
          </div>
          <label class="toggle" aria-label="Визуальные элементы">
            <input type="checkbox" id="widgets-toggle" ${p.showWidgets!==false?'checked':''}>
            <div class="toggle-track"></div>
          </label>
        </div>

        <div class="setting-row" style="flex-direction:column;align-items:flex-start;gap:10px;padding-bottom:16px">
          <div style="display:flex;align-items:center;gap:10px;width:100%">
            <div class="setting-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>
            </div>
            <div class="setting-label">Целевой уровень</div>
          </div>
          <div class="level-select" style="padding-left:44px">
            ${LEVELS.map(l=>`<button class="level-opt${p.targetLevel===l?' active':''}" data-level="${l}" aria-pressed="${p.targetLevel===l}">${l.toUpperCase()}</button>`).join('')}
          </div>
        </div>

      </div>
    </div>

    <!-- ⑥ TOPICS -->
    <div>
      <div class="panel-section-label">Темы · нажмите для приоритета</div>
      <div class="topic-grid">
        ${TOPICS.map(t => {
          const w = p.topicWeights[t] || 1;
          const cls = w >= 1.3 ? 'liked' : w <= 0.6 ? 'disliked' : '';
          return `<button class="topic-chip ${cls}" data-topic="${t}" aria-pressed="${cls==='liked'}">${topicIcons[t]||''} ${t}</button>`;
        }).join('')}
      </div>
    </div>

    <!-- ⑦ VOCABULARY -->
    ${p.savedWords.length > 0 ? `
    <div>
      <div class="panel-section-label">Словарь — ${p.savedWords.length} слов</div>
      <div class="words-list">${wordsHtml}</div>
    </div>` : ''}

    <!-- ⑧ RESET -->
    <div style="padding:4px 0 8px">
      <button id="reset-btn" style="display:flex;align-items:center;gap:6px;font-size:.74rem;color:var(--subtle);background:none;border:none;cursor:pointer;font-family:var(--sans);padding:10px 0;min-height:44px" aria-label="Сбросить все данные">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        Сбросить все данные
      </button>
    </div>`;


  // Widgets toggle (маскот + прогресс)
  document.getElementById('widgets-toggle').addEventListener('change', e => {
    const p2 = getProfile(); p2.showWidgets = e.target.checked; saveProfile(p2); renderPanel();
  });

  // Dark mode
  document.getElementById('dark-toggle').addEventListener('change', e => {
    const p2 = getProfile(); p2.darkMode = e.target.checked; saveProfile(p2); applyTheme(p2.darkMode);
  });

  // Hide read toggle
  document.getElementById('hide-read-toggle').addEventListener('change', e => {
    const p2 = getProfile(); p2.hideRead = e.target.checked; saveProfile(p2); render();
  });

  // Level filter toggle
  document.getElementById('level-filter-toggle').addEventListener('change', e => {
    const p2 = getProfile(); p2.levelFilter = e.target.checked; saveProfile(p2); render();
  });

  // Level selector
  document.querySelectorAll('.level-opt').forEach(btn => {
    btn.addEventListener('click', () => {
      const p2 = getProfile(); p2.targetLevel = btn.dataset.level; saveProfile(p2);
      document.querySelectorAll('.level-opt').forEach(b => { b.classList.remove('active'); b.setAttribute('aria-pressed','false'); });
      btn.classList.add('active'); btn.setAttribute('aria-pressed','true');
    });
  });

  // Topic chips — cycle neutral → liked → disliked → neutral
  document.querySelectorAll('.topic-chip').forEach(btn => {
    btn.addEventListener('click', () => {
      const p2 = getProfile(); const t = btn.dataset.topic;
      const w = p2.topicWeights[t] || 1;
      if (w >= 1.3)      { p2.topicWeights[t] = 0.4; btn.className='topic-chip disliked'; btn.setAttribute('aria-pressed','false'); }
      else if (w <= 0.6) { p2.topicWeights[t] = 1;   btn.className='topic-chip';          btn.setAttribute('aria-pressed','false'); }
      else               { p2.topicWeights[t] = 1.8;  btn.className='topic-chip liked';    btn.setAttribute('aria-pressed','true'); }
      saveProfile(p2);
    });
  });

  // Delete word
  document.querySelectorAll('.word-del').forEach(btn => {
    btn.addEventListener('click', () => {
      const p2 = getProfile();
      p2.savedWords = p2.savedWords.filter(w => w.word !== btn.dataset.word);
      saveProfile(p2); renderPanel();
    });
  });

  // Reset
  document.getElementById('reset-btn').addEventListener('click', () => {
    if (confirm('Сбросить все данные: историю чтения, слова и настройки?')) {
      localStorage.removeItem('nl_profile');
      closePanel(); render();
    }
  });
}

// ════════════════════════════════════════════
// FILTERS
// ════════════════════════════════════════════
// Use event delegation on fbar to avoid stale closures
document.querySelector('.fbar').addEventListener('click', e => {
  const btn = e.target.closest('.pill');
  if (!btn) return;
  const f = btn.dataset.f;
  const v = btn.dataset.v;

  if (f === 'level') {
    if (v === 'all') {
      F.level.clear();
      document.querySelectorAll('.pill[data-f="level"]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    } else {
      // Deactivate "All" pill
      document.querySelector('.pill[data-f="level"][data-v="all"]').classList.remove('active');
      if (F.level.has(v)) {
        F.level.delete(v);
        btn.classList.remove('active');
        if (F.level.size === 0) {
          // Nothing selected — reset to All
          F.level.clear();
          document.querySelectorAll('.pill[data-f="level"]').forEach(b => b.classList.remove('active'));
          document.querySelector('.pill[data-f="level"][data-v="all"]').classList.add('active');
        }
      } else {
        F.level.add(v);
        btn.classList.add('active');
      }
    }
  } else {
    document.querySelectorAll(`.pill[data-f="${f}"]`).forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    F[f] = v;
  }
  render();
});
document.getElementById('search').addEventListener('input', e => { Q = e.target.value.trim(); render(); });

let _rt;
window.addEventListener('resize', () => { clearTimeout(_rt); _rt = setTimeout(render, 200); });

// ════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════
loadAll();
setInterval(loadAll, 15 * 60 * 1000);
</script>
</body>
</html>
