<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Newslearn</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#f7f4ef; --surface:#fff; --border:#e8e2d9;
  --text:#1c1917; --muted:#78716c; --subtle:#a8a29e;
  --accent:#16653a; --accent2:#e8f0eb;
  --a2:#dcfce7; --a2t:#166534;
  --b1:#fef9c3; --b1t:#854d0e;
  --b2:#fee2e2; --b2t:#991b1b;
  --hh:56px; --fh:48px;
  --font-sans:'Inter',system-ui,sans-serif;
  --font-serif:'Playfair Display',Georgia,serif;
}
html { font-size:16px; }
body { font-family:var(--font-sans); background:var(--bg); color:var(--text); -webkit-text-size-adjust:100%; overflow-x:hidden; }

/* ── HEADER ── */
header {
  background:var(--surface); border-bottom:1px solid var(--border);
  padding:0 1.5rem; height:var(--hh);
  display:flex; align-items:center; justify-content:space-between;
  position:sticky; top:0; z-index:40;
}
.logo { font-family:var(--font-serif); font-size:1.4rem; color:var(--accent); cursor:pointer; user-select:none; }
.logo span { color:var(--text); }
#updated { font-size:.72rem; color:var(--muted); font-family:var(--font-sans); }

/* ── FILTER BAR ── */
.fbar {
  background:var(--surface); border-bottom:1px solid var(--border);
  position:sticky; top:var(--hh); z-index:30;
  overflow-x:auto; scrollbar-width:none; -webkit-overflow-scrolling:touch;
}
.fbar::-webkit-scrollbar { display:none; }
.finner { display:flex; align-items:center; padding:0 1.5rem; height:var(--fh); min-width:max-content; gap:0; }
.fg { display:flex; align-items:center; gap:4px; flex-shrink:0; }
.fg+.fg { margin-left:.85rem; padding-left:.85rem; border-left:1px solid var(--border); }
.flabel { font-size:.62rem; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.07em; margin-right:2px; font-family:var(--font-sans); }
.pill {
  padding:3px 10px; border-radius:100px;
  border:1px solid var(--border); background:transparent;
  font-family:var(--font-sans); font-size:.74rem; font-weight:400; color:var(--muted);
  cursor:pointer; transition:all .12s; white-space:nowrap; line-height:1.7;
  -webkit-tap-highlight-color:transparent;
}
.pill:hover { border-color:var(--accent); color:var(--accent); }
.pill.active { background:var(--accent); border-color:var(--accent); color:#fff; font-weight:500; }
.fg-search { margin-left:auto; }
.swrap { position:relative; }
.sinput {
  padding:4px 10px 4px 30px; border:1.5px solid var(--accent);
  border-radius:100px; background:var(--accent2);
  font-family:var(--font-sans); font-size:.78rem; color:var(--text);
  width:155px; outline:none; transition:width .2s,box-shadow .15s;
}
.sinput::placeholder { color:var(--muted); }
.sinput:focus { width:210px; box-shadow:0 0 0 3px rgba(22,101,58,.1); }
.sico { position:absolute; left:9px; top:50%; transform:translateY(-50%); pointer-events:none; }

/* ── MAIN ── */
.main { max-width:1180px; margin:0 auto; padding:1.25rem 1.5rem; }
#stats { font-size:.78rem; color:var(--muted); margin-bottom:1rem; font-family:var(--font-sans); }
#stats b { color:var(--text); }

/* ── MASONRY ── */
.masonry {
  column-count:3; column-gap:1rem;
  column-fill:balance;
}
.card {
  display:block; break-inside:avoid; -webkit-column-break-inside:avoid; page-break-inside:avoid;
  background:var(--surface); border:1px solid var(--border); border-radius:12px;
  padding:1rem 1.1rem; margin-bottom:1rem;
  cursor:pointer; transition:transform .13s,box-shadow .13s;
  -webkit-tap-highlight-color:transparent;
  /* Force block formatting context to prevent bleed */
  overflow:hidden;
}
.card:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(0,0,0,.08); }
.cmeta { display:flex; align-items:center; justify-content:space-between; margin-bottom:.45rem; }
.csrc { font-size:.63rem; font-weight:600; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); font-family:var(--font-sans); }
.lvl { font-size:.63rem; font-weight:600; padding:2px 7px; border-radius:100px; font-family:var(--font-sans); }
.lvl-a2{background:var(--a2);color:var(--a2t);}
.lvl-b1{background:var(--b1);color:var(--b1t);}
.lvl-b2{background:var(--b2);color:var(--b2t);}
.ctitle { font-family:var(--font-serif); font-size:.97rem; line-height:1.42; font-weight:600; color:var(--text); margin-bottom:.4rem; }
.cdesc { font-size:.79rem; color:var(--muted); line-height:1.6; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; margin-bottom:.55rem; font-family:var(--font-sans); }
.cfoot { display:flex; align-items:center; justify-content:space-between; padding-top:.5rem; border-top:1px solid var(--border); }
.cdate { font-size:.68rem; color:var(--subtle); font-family:var(--font-sans); }
.ctopic { font-size:.63rem; font-weight:600; padding:2px 7px; border-radius:4px; background:var(--accent2); color:var(--accent); text-transform:capitalize; font-family:var(--font-sans); }

/* ── STATE ── */
.state { padding:4rem 1rem; text-align:center; color:var(--muted); }
.state h3 { font-family:var(--font-serif); color:var(--text); margin-bottom:.4rem; font-size:1.1rem; }
.state p { font-size:.82rem; line-height:1.7; max-width:360px; margin:0 auto; font-family:var(--font-sans); }
.spinner { width:32px; height:32px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .75s linear infinite; margin:0 auto 1rem; }
@keyframes spin{to{transform:rotate(360deg);}}
.retry { margin-top:1rem; padding:7px 18px; background:var(--accent); color:#fff; border:none; border-radius:8px; font-family:var(--font-sans); font-size:.82rem; font-weight:500; cursor:pointer; }

/* ══════════════════════════════════════
   READER — full page overlay
   ══════════════════════════════════════ */
.overlay {
  display:none; position:fixed; inset:0; z-index:50;
  background:var(--bg); overflow-y:auto; -webkit-overflow-scrolling:touch;
}
.overlay.open { display:block; animation:pagein .2s ease; }
@keyframes pagein { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }

/* Reader header */
.r-header {
  background:var(--surface); border-bottom:1px solid var(--border);
  padding:0 2rem; height:56px;
  display:flex; align-items:center; justify-content:space-between;
  position:sticky; top:0; z-index:10;
}
.r-back {
  display:flex; align-items:center; gap:.4rem;
  background:none; border:none; font-family:var(--font-sans);
  font-size:.82rem; color:var(--muted); cursor:pointer; padding:6px 0;
  transition:color .12s; -webkit-tap-highlight-color:transparent;
}
.r-back:hover { color:var(--accent); }
.r-meta-badge { display:flex; align-items:center; gap:.5rem; }

/* Reader body */
.r-body { max-width:680px; margin:0 auto; padding:2.5rem 1.5rem 5rem; }

.r-eyebrow {
  display:flex; align-items:center; gap:.6rem; margin-bottom:1rem; flex-wrap:wrap;
}
.r-source { font-size:.72rem; font-weight:600; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); font-family:var(--font-sans); }
.r-date   { font-size:.72rem; color:var(--subtle); font-family:var(--font-sans); }
.r-dot    { width:3px; height:3px; border-radius:50%; background:var(--subtle); }

.r-title {
  font-family:var(--font-serif); font-size:2rem; line-height:1.25;
  font-weight:600; color:var(--text); margin-bottom:1.5rem;
}

.r-hint {
  display:inline-flex; align-items:center; gap:.4rem;
  font-size:.75rem; color:var(--muted); font-family:var(--font-sans);
  padding:.4rem .75rem; background:var(--accent2);
  border-radius:8px; margin-bottom:1.75rem;
}

/* Article text */
.r-article { font-family:var(--font-sans); }
.r-article p {
  font-size:1.1rem; line-height:1.9; color:#2c2825;
  margin-bottom:1.35rem;
  font-family:'Inter',system-ui,sans-serif;
  font-weight:400; letter-spacing:.01em;
}
.r-article h2 {
  font-family:'Playfair Display',Georgia,serif; font-size:1.35rem; font-weight:600;
  color:var(--text); margin:2.25rem 0 .75rem; line-height:1.3;
}
.r-article h3 {
  font-family:'Playfair Display',Georgia,serif; font-size:1.1rem; font-weight:400; font-style:italic;
  color:var(--text); margin:1.75rem 0 .6rem;
}
.r-article blockquote {
  border-left:3px solid var(--accent); padding:.75rem 1.25rem;
  margin:1.5rem 0; color:var(--muted); font-style:italic;
  font-family:'Playfair Display',Georgia,serif; font-size:1.05rem; line-height:1.75;
  background:var(--accent2); border-radius:0 8px 8px 0;
}

/* Clickable words */
.w {
  cursor:pointer; border-radius:3px; padding:0 1px;
  transition:background .1s; display:inline;
}
.w:hover { background:var(--b1); }

/* Loading skeleton */
.rskel { margin:2rem 0; display:flex; flex-direction:column; gap:.8rem; }
.rskel-line { background:var(--border); border-radius:4px; height:14px; animation:pulse 1.2s ease infinite; }
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* Open original button */
.r-open-btn {
  display:inline-flex; align-items:center; gap:.45rem;
  margin-top:2rem; padding:.65rem 1.35rem;
  background:var(--accent); color:#fff; border-radius:9px;
  text-decoration:none; font-family:var(--font-sans);
  font-size:.85rem; font-weight:500; transition:opacity .13s;
}
.r-open-btn:hover { opacity:.85; }

/* Divider */
.r-divider { border:none; border-top:1px solid var(--border); margin:2rem 0; }

/* ── WORD POPUP ── */
.wpop {
  position:fixed; z-index:60;
  background:var(--surface); border:1px solid var(--border); border-radius:12px;
  padding:.8rem 1rem 1rem; max-width:260px;
  box-shadow:0 8px 28px rgba(0,0,0,.13);
  opacity:0; pointer-events:none; transition:opacity .15s;
  font-family:var(--font-sans);
}
.wpop.show { opacity:1; pointer-events:auto; }
.wclose { position:absolute; top:.4rem; right:.6rem; background:none; border:none; font-size:.85rem; color:var(--muted); cursor:pointer; font-family:var(--font-sans); }
.wword { font-family:var(--font-serif); font-size:1.15rem; color:var(--text); margin-bottom:.2rem; }
.wphon { font-size:.73rem; color:var(--muted); margin-bottom:.4rem; font-family:var(--font-sans); }
.wpos  { font-size:.63rem; font-weight:600; color:var(--accent); text-transform:uppercase; letter-spacing:.05em; margin:.3rem 0 .1rem; font-family:var(--font-sans); }
.wdef  { font-size:.82rem; line-height:1.55; color:var(--text); font-family:var(--font-sans); }
.wloading { font-size:.8rem; color:var(--muted); font-family:var(--font-sans); }

/* ── RESPONSIVE ── */
@media(max-width:640px){
  :root{--fh:44px;}
  header,.finner { padding-left:1rem; padding-right:1rem; }
  .main { padding:1rem; }
  .masonry { column-count:1; }
  .sinput { width:120px; }
  .sinput:focus { width:150px; }
  .r-header { padding:0 1rem; }
  .r-body { padding:1.5rem 1rem 4rem; }
  .r-title { font-size:1.4rem; }
  .r-article p { font-size:1rem; }
}
@media(min-width:641px) and (max-width:960px){
  .masonry { column-count:2; }
}
</style>
</head>
<body>

<header>
  <div class="logo" id="logo">News<span>learn</span></div>
  <span id="updated"></span>
</header>

<div class="fbar"><div class="finner">
  <div class="fg">
    <span class="flabel">Level</span>
    <button class="pill active" data-f="level" data-v="all">All</button>
    <button class="pill" data-f="level" data-v="a2">A2</button>
    <button class="pill" data-f="level" data-v="b1">B1</button>
    <button class="pill" data-f="level" data-v="b2">B2+</button>
  </div>
  <div class="fg">
    <span class="flabel">Topic</span>
    <button class="pill active" data-f="topic" data-v="all">All</button>
    <button class="pill" data-f="topic" data-v="technology">Tech</button>
    <button class="pill" data-f="topic" data-v="science">Science</button>
    <button class="pill" data-f="topic" data-v="world">World</button>
    <button class="pill" data-f="topic" data-v="business">Business</button>
    <button class="pill" data-f="topic" data-v="health">Health</button>
  </div>
  <div class="fg">
    <span class="flabel">Source</span>
    <button class="pill active" data-f="source" data-v="all">All</button>
    <button class="pill" data-f="source" data-v="BBC">BBC</button>
    <button class="pill" data-f="source" data-v="Guardian">Guardian</button>
    <button class="pill" data-f="source" data-v="The Verge">Verge</button>
    <button class="pill" data-f="source" data-v="NY Times">NYT</button>
    <button class="pill" data-f="source" data-v="Ars Technica">Ars</button>
  </div>
  <div class="fg fg-search">
    <div class="swrap">
      <svg class="sico" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#16653a" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input class="sinput" id="search" type="search" placeholder="Search…" autocomplete="off">
    </div>
  </div>
</div></div>

<div class="main">
  <div id="stats"></div>
  <div id="root"><div class="state"><div class="spinner"></div><h3>Loading…</h3></div></div>
</div>

<!-- READER — full page -->
<div class="overlay" id="overlay">
  <div class="r-header">
    <button class="r-back" id="r-back">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Back
    </button>
    <div class="r-meta-badge" id="r-badge"></div>
  </div>
  <div class="r-body" id="r-body"></div>
</div>

<!-- WORD POPUP -->
<div class="wpop" id="wpop">
  <button class="wclose" id="wclose">✕</button>
  <div id="wbody"></div>
</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
let ALL = [], ARTICLES = [];
let F = {level:'all', topic:'all', source:'all'}, Q = '';
let DICT = {}, popWord = null;

// ── Sanitize ──────────────────────────────────────────────────────────────────
function h(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// Strip any remaining HTML tags from a plain-text string (server may send them)
function stripTags(s){
  return String(s||'')
    .replace(/<\/?(p|div|br|span|a|strong|em|b|i|ul|li|ol)[^>]*>/gi,' ')
    .replace(/<[^>]+>/g,'')
    .replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"').replace(/&apos;/g,"'").replace(/&nbsp;/g,' ')
    .replace(/&#x2019;|&#8217;/g,"'").replace(/&#x2018;|&#8216;/g,"'")
    .replace(/&#x201C;|&#8220;/g,'"').replace(/&#x201D;|&#8221;/g,'"')
    .replace(/&#x2013;|&#8211;/g,'–').replace(/&#x2014;|&#8212;/g,'—')
    .replace(/&#x2026;|&#8230;/g,'…').replace(/&#xA0;|&#160;/g,' ')
    .replace(/&#[xX][0-9a-fA-F]+;/g,'').replace(/&#\d+;/g,'').replace(/&[a-z]+;/g,' ')
    .replace(/\s+/g,' ').trim();
}

function fmtDate(s){
  const d = new Date(s);
  return isNaN(d.getTime()) ? '' : d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
}
function isJunk(a){
  if (!a.title || a.title.length < 20) return true;
  if (!a.url || !a.url.startsWith('http')) return true;
  if (a.title.trim().split(/\s+/).length < 4) return true;
  return false;
}

// ── Render cards ──────────────────────────────────────────────────────────────
function render(){
  const list = ALL.filter(a => {
    if (isJunk(a)) return false;
    if (F.level  !== 'all' && a.level  !== F.level)  return false;
    if (F.topic  !== 'all' && a.topic  !== F.topic)  return false;
    if (F.source !== 'all' && a.source !== F.source) return false;
    if (Q){
      const q = Q.toLowerCase();
      if (!a.title.toLowerCase().includes(q) && !(a.desc||'').toLowerCase().includes(q)) return false;
    }
    return true;
  });

  const clean = ALL.filter(a=>!isJunk(a));
  document.getElementById('stats').innerHTML =
    list.length === clean.length ? `<b>${list.length}</b> articles` : `<b>${list.length}</b> of <b>${clean.length}</b> articles`;

  if(!list.length){
    document.getElementById('root').innerHTML='<div class="state"><h3>No results</h3><p>Try different filters.</p></div>';
    return;
  }

  document.getElementById('root').innerHTML =
    '<div class="masonry">' +
    list.map(a => {
      const idx = ARTICLES.indexOf(a);
      const desc = stripTags(a.desc||'');
      return `<div class="card" data-idx="${idx}">
        <div class="cmeta">
          <span class="csrc">${h(a.source)}</span>
          <span class="lvl lvl-${a.level}">${a.level.toUpperCase()}</span>
        </div>
        <div class="ctitle">${h(a.title)}</div>
        ${desc ? `<div class="cdesc">${h(desc)}</div>` : ''}
        <div class="cfoot">
          <span class="cdate">${fmtDate(a.date)}</span>
          <span class="ctopic">${h(a.topic)}</span>
        </div>
      </div>`;
    }).join('') +
    '</div>';

  document.querySelectorAll('.card[data-idx]').forEach(el => {
    el.addEventListener('click', () => openReader(parseInt(el.dataset.idx)));
  });
}

// ── Load news ─────────────────────────────────────────────────────────────────
async function loadAll(){
  document.getElementById('stats').textContent='';
  document.getElementById('root').innerHTML='<div class="state"><div class="spinner"></div><h3>Loading articles…</h3></div>';
  try {
    const res = await fetch('/api/news');
    if(!res.ok) throw new Error('HTTP '+res.status);
    const data = await res.json();
    ARTICLES = data.articles||[];
    ALL = ARTICLES;
    document.getElementById('updated').textContent =
      'Updated '+new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
    render();
  } catch(e){
    document.getElementById('root').innerHTML=
      `<div class="state"><h3>Could not load</h3><p>${e.message}</p><button class="retry" onclick="loadAll()">Retry</button></div>`;
  }
}

// ── Reader ────────────────────────────────────────────────────────────────────
async function openReader(idx){
  const a = ARTICLES[idx];
  if(!a) return;

  // Update badge in reader header
  document.getElementById('r-badge').innerHTML =
    `<span class="csrc">${h(a.source)}</span>
     <span class="lvl lvl-${a.level}">${a.level.toUpperCase()}</span>`;

  // Show skeleton
  document.getElementById('r-body').innerHTML =
    `<div class="r-eyebrow">
       <span class="r-source">${h(a.source)}</span>
       <span class="r-dot"></span>
       <span class="r-date">${fmtDate(a.date)}</span>
     </div>
     <div class="r-title">${h(a.title)}</div>
     <hr class="r-divider">
     <div class="rskel">
       <div class="rskel-line" style="width:100%"></div>
       <div class="rskel-line" style="width:94%"></div>
       <div class="rskel-line" style="width:97%"></div>
       <div class="rskel-line" style="width:88%"></div>
       <div class="rskel-line" style="width:100%"></div>
       <div class="rskel-line" style="width:91%"></div>
       <div class="rskel-line" style="width:96%"></div>
       <div class="rskel-line" style="width:85%"></div>
     </div>`;

  document.getElementById('overlay').classList.add('open');
  document.getElementById('overlay').scrollTop = 0;
  document.body.style.overflow = 'hidden';

  // Fetch full article from server
  try {
    const res  = await fetch('/api/article?url='+encodeURIComponent(a.url));
    const data = await res.json();
    if(data.ok && data.blocks && data.blocks.length >= 2){
      renderArticle(a, data.blocks);
    } else {
      renderFallback(a);
    }
  } catch {
    renderFallback(a);
  }
}

function tokenize(text){
  return text.split(/(\b)/).map(tok =>
    /^[a-zA-Z]{2,}$/.test(tok)
      ? `<span class="w" data-word="${tok.toLowerCase()}">${tok}</span>`
      : tok
  ).join('');
}

function articleBodyHtml(blocks){
  return blocks.map(b => {
    const tok = tokenize(b.text);
    if(b.tag==='h1'||b.tag==='h2') return `<h2>${tok}</h2>`;
    if(b.tag==='h3'||b.tag==='h4') return `<h3>${tok}</h3>`;
    if(b.tag==='blockquote') return `<blockquote>${tok}</blockquote>`;
    return `<p>${tok}</p>`;
  }).join('');
}

function renderArticle(a, blocks){
  document.getElementById('r-body').innerHTML =
    `<div class="r-eyebrow">
       <span class="r-source">${h(a.source)}</span>
       <span class="r-dot"></span>
       <span class="r-date">${fmtDate(a.date)}</span>
       <span class="r-dot"></span>
       <span class="ctopic" style="font-size:.7rem">${h(a.topic)}</span>
     </div>
     <div class="r-title">${h(a.title)}</div>
     <hr class="r-divider">
     <div class="r-hint">💡 Tap any word to see its definition</div>
     <div class="r-article">${articleBodyHtml(blocks)}</div>
     <hr class="r-divider">
     <a class="r-open-btn" href="${h(a.url)}" target="_blank" rel="noopener noreferrer">
       Open original article
       <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
     </a>`;
  attachWordHandlers();
}

function renderFallback(a){
  const desc = stripTags(a.desc||'');
  document.getElementById('r-body').innerHTML =
    `<div class="r-eyebrow">
       <span class="r-source">${h(a.source)}</span>
       <span class="r-dot"></span>
       <span class="r-date">${fmtDate(a.date)}</span>
     </div>
     <div class="r-title">${h(a.title)}</div>
     <hr class="r-divider">
     ${desc ? `<div class="r-hint">💡 Tap any word to see its definition</div>
     <div class="r-article"><p>${tokenize(desc)}</p></div><hr class="r-divider">` : ''}
     <a class="r-open-btn" href="${h(a.url)}" target="_blank" rel="noopener noreferrer">
       Read full article
       <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
     </a>`;
  attachWordHandlers();
}

function attachWordHandlers(){
  document.querySelectorAll('#r-body .w').forEach(el => {
    el.addEventListener('click', e => { e.stopPropagation(); lookupWord(e, el.dataset.word); });
  });
}

function closeReader(){
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
  closePopup();
}

document.getElementById('r-back').addEventListener('click', closeReader);
document.getElementById('logo').addEventListener('click', closeReader);
document.addEventListener('keydown', e => { if(e.key==='Escape') closeReader(); });

// ── Word lookup ───────────────────────────────────────────────────────────────
async function lookupWord(e, word){
  if(popWord===word){ closePopup(); return; }
  popWord = word;

  const pop  = document.getElementById('wpop');
  const body = document.getElementById('wbody');

  const x = Math.min(e.clientX+8, window.innerWidth-275);
  const y = Math.min(e.clientY+20, window.innerHeight-190);
  pop.style.left = x+'px';
  pop.style.top  = y+'px';
  body.innerHTML = `<div class="wword">${word}</div><div class="wloading">Looking up…</div>`;
  pop.classList.add('show');

  if(DICT[word]){ renderPopup(DICT[word]); return; }

  try {
    const res  = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`);
    if(!res.ok) throw new Error();
    const data = await res.json();
    DICT[word] = data[0];
    renderPopup(data[0]);
  } catch {
    body.innerHTML = `<div class="wword">${word}</div><div class="wdef" style="color:var(--muted)">No definition found.</div>`;
  }
}

function renderPopup(entry){
  const phon = entry.phonetics?.find(p=>p.text)?.text||'';
  const meanings = (entry.meanings||[]).slice(0,2);
  let html = `<div class="wword">${entry.word}</div>`;
  if(phon) html += `<div class="wphon">${phon}</div>`;
  meanings.forEach(m => {
    const def = m.definitions?.[0]?.definition||'';
    if(def) html += `<div class="wpos">${m.partOfSpeech}</div><div class="wdef">${def}</div>`;
  });
  document.getElementById('wbody').innerHTML = html;
}

function closePopup(){
  popWord = null;
  document.getElementById('wpop').classList.remove('show');
}

document.getElementById('wclose').addEventListener('click', closePopup);
document.addEventListener('click', e => {
  const pop = document.getElementById('wpop');
  if(pop.classList.contains('show') && !pop.contains(e.target) && !e.target.classList.contains('w')) closePopup();
});

// ── Filters ───────────────────────────────────────────────────────────────────
document.querySelectorAll('.pill').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll(`.pill[data-f="${btn.dataset.f}"]`).forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    F[btn.dataset.f] = btn.dataset.v;
    render();
  });
});

document.getElementById('search').addEventListener('input', e => { Q=e.target.value.trim(); render(); });

// ── Init ──────────────────────────────────────────────────────────────────────
loadAll();
setInterval(loadAll, 15*60*1000);
</script>

</html>
